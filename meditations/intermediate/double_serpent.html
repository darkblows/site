<title>Twin Serpent Meditation — Caduceus Alignment and Sushumna Staff</title>
<desc>A 24-second visual loop showcasing the rise of dual ciano and gold serpents crossing at each pyramid chakra, with a central staff spinning at high frequency (light-speed simulation).</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="12" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.5"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Staff/Central Channel Gradient -->
  <linearGradient id="staffGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.2"/>
    <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.2"/>

    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>

<g filter="url(#heavyGlow)">
  <rect x="294" y="145" width="12" height="480" fill="url(#staffGrad)" rx="6" opacity="0.2">

    <animate attributeName="opacity" values="0.2; 1; 0.4; 1; 0.2" keyTimes="0; 0.125; 0.25; 0.666; 1" dur="24s" repeatCount="indefinite" />

</g>
