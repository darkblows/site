<meta charset="UTF-8">
<title>Aura Empowerment Circuit — Advanced Meditation</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Aura Empowerment Meditation — Joint and Chakra Energy Circuit Guide</title>
<desc>A 32-second loop illustrating the full-body aura empowerment circuit. Shows major chakras and minor joint nodes (shoulders, elbows, wrists, knees, ankles) lighting up sequentially and flowing energy into glowing palm and foot spheres.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="6" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="12" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.6"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Spheres Radial Gradient (Sun-like power) -->
  <radialGradient id="sphereGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="25%" stop-color="#FFF59D" stop-opacity="0.9"/>
    <stop offset="65%" stop-color="#FFB300" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
  </radialGradient>

  <!-- Head/Neck Wrap Gradient (Phase 1) -->
  <radialGradient id="headWrapGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
    <stop offset="60%" stop-color="#FFF59D" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#FFF59D" stop-opacity="0"/>
  </radialGradient>

  <!-- Concentric Gold-White Path Gradient -->
  <linearGradient id="flowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.4"/>
    <stop offset="50%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.4"/>
  </linearGradient>

  <!-- Reusable Major Chakra Node -->
  <g id="major-node">
    <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#FFD54F" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="3" fill="#FFFFFF" filter="url(#glow)"/>
  </g>

  <!-- Reusable Minor Joint Node -->
  <g id="minor-node">
    <circle cx="0" cy="0" r="6" fill="#FFFFFF" stroke="#E1F5EE" stroke-width="1.5" filter="url(#glow)"/>
  </g>

  <!-- Reusable Hand/Foot Energy Sphere -->
  <g id="energy-sphere">
    <circle cx="0" cy="0" r="28" fill="url(#sphereGrad)" filter="url(#glow)">
      <animate attributeName="r" values="24; 32; 24" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="5" fill="#FFFFFF" filter="url(#glow)"/>
  </g>

  <!-- Reusable Base Figure (Dark Silhouette) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= PHASE 1: Head & Neck White-Gold Wrap ================= -->
<ellipse cx="300" cy="265" rx="80" ry="105" fill="url(#headWrapGrad)" filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0.9; 0.9; 0.9; 0" keyTimes="0; 0.05; 0.25; 0.90; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="rx" values="75; 85; 75" dur="3s" repeatCount="indefinite" />
</ellipse>


<!-- ================= BASE MEDITATING SILHOUETTE ================= -->
<use href="#meditating-figure" />


<!-- ================= SYSTEMIC ENERGY CONDUITS / PATHWAYS ================= -->
<!-- Spine pathway (P1) -->
<path d="M 300 215 L 300 605" stroke="url(#flowGrad)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="12 20" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 1; 1; 1; 0" keyTimes="0; 0.05; 0.25; 0.90; 1" dur="32s" repeatCount="indefinite"/>
  <animate attributeName="stroke-dashoffset" values="0; -80" dur="1.5s" repeatCount="indefinite" />
</path>

<!-- Upper Arms pathway (P2) -->
<g stroke="url(#flowGrad)" stroke-width="3" stroke-dasharray="10 15" stroke-linecap="round" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 1; 0" keyTimes="0; 0.23; 0.25; 0.90; 0.95; 1" dur="32s" repeatCount="indefinite"/>
  <animate attributeName="stroke-dashoffset" values="0; -60" dur="1s" repeatCount="indefinite" />
  
  <!-- Left Arm: Throat -> Shoulder -> Elbow -> Wrist -> Palm -->
  <path d="M 300 315 L 245 365 L 225 480 L 245 605 L 260 630" fill="none" />
  <!-- Right Arm: Throat -> Shoulder -> Elbow -> Wrist -> Palm -->
  <path d="M 300 315 L 355 365 L 375 480 L 355 605 L 340 630" fill="none" />
</g>

<!-- Lower Body pathway (P3) -->
<g stroke="url(#flowGrad)" stroke-width="3" stroke-dasharray="10 15" stroke-linecap="round" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 1; 0" keyTimes="0; 0.48; 0.50; 0.90; 0.95; 1" dur="32s" repeatCount="indefinite"/>
  <animate attributeName="stroke-dashoffset" values="0; -60" dur="1s" repeatCount="indefinite" />
  
  <!-- Left Leg: Root -> Hip -> Knee -> Ankle -> Feet -->
  <path d="M 300 605 L 255 615 L 225 615 L 245 680 L 215 715" fill="none" />
  <!-- Right Leg: Root -> Hip -> Knee -> Ankle -> Feet -->
  <path d="M 300 605 L 345 615 L 375 615 L 355 680 L 385 715" fill="none" />
</g>


<!-- ================= ACTIVE ENERGY NODES (Chakras) ================= -->

<!-- Phase 1: Head & Neck Nodes -->
<g opacity="0">
  <animate attributeName="opacity" values="0; 1; 1; 1; 0" keyTimes="0; 0.05; 0.25; 0.90; 1" dur="32s" repeatCount="indefinite"/>
  <use href="#major-node" x="300" y="215"/> <!-- Crown -->
  <use href="#major-node" x="300" y="255"/> <!-- Third Eye -->
  <use href="#major-node" x="300" y="315"/> <!-- Throat -->
</g>

<!-- Phase 2: Shoulder, Arm Joint Nodes & Palm Spheres -->
<g opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 1; 0" keyTimes="0; 0.23; 0.25; 0.90; 0.95; 1" dur="32s" repeatCount="indefinite"/>
  <use href="#minor-node" x="245" y="365" /> <!-- L Shoulder -->
  <use href="#minor-node" x="355" y="365" /> <!-- R Shoulder -->
  <use href="#minor-node" x="225" y="480" /> <!-- L Elbow -->
  <use href="#minor-node" x="375" y="480" /> <!-- R Elbow -->
  <use href="#minor-node" x="245" y="605" /> <!-- L Wrist -->
  <use href="#minor-node" x="355" y="605" /> <!-- R Wrist -->
  <use href="#energy-sphere" x="260" y="630" /> <!-- L Palm Sphere -->
  <use href="#energy-sphere" x="340" y="630" /> <!-- R Palm Sphere -->
</g>

<!-- Phase 3: Torso, Lower Joint Nodes & Foot Spheres -->
<g opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 1; 0" keyTimes="0; 0.48; 0.50; 0.90; 0.95; 1" dur="32s" repeatCount="indefinite"/>
  <use href="#major-node" x="300" y="375"/> <!-- Heart -->
  <use href="#major-node" x="300" y="455"/> <!-- Solar Plexus -->
  <use href="#major-node" x="300" y="545"/> <!-- Sacral -->
  <use href="#major-node" x="300" y="605"/> <!-- Root -->
  <use href="#minor-node" x="225" y="615" /> <!-- L Knee -->
  <use href="#minor-node" x="375" y="615" /> <!-- R Knee -->
  <use href="#minor-node" x="245" y="680" /> <!-- L Ankle -->
  <use href="#minor-node" x="355" y="680" /> <!-- R Ankle -->
  <use href="#energy-sphere" x="215" y="715" /> <!-- L Foot Sphere -->
  <use href="#energy-sphere" x="385" y="715" /> <!-- R Foot Sphere -->
</g>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Head Line -->
  <line x1="330" y1="215" x2="505" y2="220" />
  <!-- Upper Joints Line -->
  <line x1="365" y1="365" x2="505" y2="370" />
  <!-- Torso Line -->
  <line x1="315" y1="455" x2="505" y2="460" />
  <!-- Palms Line -->
  <line x1="355" y1="630" x2="505" y2="635" />
  <!-- Feet Line -->
  <line x1="410" y1="715" x2="505" y2="720" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Head Label -->
  <text x="510" y="224" fill="#FFF59D" filter="url(#glow)">Crown, Third Eye &amp; Throat</text>
  <text x="510" y="239" font-weight="normal" fill="#888">Inhale 6 breaths to wrap head/neck</text>

  <!-- Upper Joints Label -->
  <text x="510" y="374">Shoulders, Elbows &amp; Wrists</text>
  <text x="510" y="389" font-weight="normal" fill="#888">Minor joint chakras open energy flow</text>

  <!-- Torso Label -->
  <text x="510" y="464">Core Torso Centers</text>
  <text x="510" y="479" font-weight="normal" fill="#888">Heart, Solar, Sacral &amp; Root</text>

  <!-- Palms Label -->
  <text x="510" y="639" fill="#FFF59D" filter="url(#glow)">Palm Energy Spheres</text>
  <text x="510" y="654" font-weight="normal" fill="#888">Blinding white-gold spheres in hands</text>

  <!-- Feet Label -->
  <text x="510" y="724">Knees, Ankles &amp; Soles</text>
  <text x="510" y="739" font-weight="normal" fill="#888">White-gold spheres anchoring feet</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 8s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="32s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFF59D" text-anchor="middle">
      PHASE 1: ACTIVATE UPPER CIRCUIT &amp; HEAD HALO
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Inhale for 6 breaths. Wrap your entire head and neck inside and out with white-gold light.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Relax, feel the energy for 5 minutes, then charge the Crown, Third Eye, and Throat."
    </text>
  </g>

  <!-- PHASE 2 TEXTS (8s - 16s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.24; 0.26; 0.48; 0.50; 1" dur="32s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      PHASE 2: UNLOCK ARMS, UPPER JOINTS &amp; PALMS
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Inhale 6 breaths per joint. Charge shoulders, elbows, and wrists to open energy pathways.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Visualize blinding white-golden energy spheres glowing inside both palms."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (16s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.49; 0.51; 0.73; 0.75; 1" dur="32s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFD54F" text-anchor="middle">
      PHASE 3: EMPOWER TORSO, LOWER JOINTS &amp; FEET
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Charge core major chakras (Heart, Solar, Sacral, Root), then pass down to hips, knees, and ankles.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Visualize two massive spheres of brilliant white-golden light blazing under your feet."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (24s - 32s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.74; 0.76; 0.98; 1" dur="32s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle">
      PHASE 4: INTEGRATE CIRCUITS &amp; DIRECT HEALING
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Feel the entire bio-network fully illuminated and synchronized, major and minor nodes.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "If treating illness, focus and direct this massive light onto the diseased area for 10-15 mins."
    </text>
  </g>
</g>

</svg>
