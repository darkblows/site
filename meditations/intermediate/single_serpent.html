<defs>

  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.6"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Aura Gradients -->
  <radialGradient id="rootAura" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FF1744" stop-opacity="0.8"/>
    <stop offset="40%" stop-color="#FF9100" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>

  <radialGradient id="thirdEyeAura" cx="50%" cy="50%" r="50%">

    <stop offset="55%" stop-color="#00E5FF" stop-opacity="0.3"/>

</defs>
