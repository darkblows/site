<meta charset="UTF-8">
<title>Meditation of Zeus — Pineal &amp; Crown Activation</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Meditation of Zeus — Pineal gland and Crown chakra electrical illumination</title>
<desc>A 20-second loop. Phase 1: Inhaling electric indigo energy from the Third Eye to the 6th Chakra. Phase 2: Holding breath to condense power in the pineal gland. Phase 3: Exhaling as electric white-gold lightning floods the brain and crown. Phase 4: Meditating on blissful residual energy.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="6" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Gradients for Energy States -->
  <!-- Third Eye Indigo Flow -->
  <radialGradient id="indigoGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#8C9EFF" stop-opacity="1"/>
    <stop offset="50%" stop-color="#3F51B5" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
  </radialGradient>

  <!-- Pineal Violet Activation -->
  <radialGradient id="violetGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="35%" stop-color="#E040FB" stop-opacity="0.8"/>
    <stop offset="75%" stop-color="#7B1FA2" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#4A148C" stop-opacity="0"/>
  </radialGradient>

  <!-- Zeus Brain Flood (White-Gold Bliss) -->
  <radialGradient id="brainFloodGrad" cx="50%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="40%" stop-color="#FFF59D" stop-opacity="0.8"/>
    <stop offset="80%" stop-color="#FFD54F" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= SCENE: HEAD GLOWS & FLOODS ================= -->

<!-- Phase 1: Indigo aura around the Third Eye/Head -->
<circle cx="300" cy="270" r="110" fill="url(#indigoGrad)" opacity="0">
  <animate attributeName="opacity" values="0; 0.8; 0.5; 0; 0" keyTimes="0; 0.20; 0.25; 0.50; 1" dur="20s" repeatCount="indefinite" />
  <animate attributeName="r" values="90; 120; 90" dur="2.5s" repeatCount="indefinite" />
</circle>

<!-- Phase 3 & 4: White-Gold Brain Flood (Bliss state) -->
<!-- Engulfs the top skull area with warm blinding light -->
<path d="M 255 265 Q 255 180 300 170 Q 345 180 345 265 Z" fill="url(#brainFloodGrad)" filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0; 1; 1; 0.4; 0" keyTimes="0; 0.25; 0.50; 0.52; 0.75; 0.95; 1" dur="20s" repeatCount="indefinite" />
  <!-- Shimmering motion of the crown halo -->
  <animate attributeName="d" 
           values="M 255 265 Q 255 180 300 170 Q 345 180 345 265 Z;
                   M 255 265 Q 252 170 300 160 Q 348 170 345 265 Z;
                   M 255 265 Q 255 180 300 170 Q 345 180 345 265 Z" 
           dur="2s" repeatCount="indefinite" />
</path>


<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================= PHASE 1: Third Eye Inhale to 6th Chakra ================= -->
<!-- Streaming energy particles from outside into the Third Eye (Y=255) and deep to 6th Chakra (Y=278) -->
<g stroke="#8C9EFF" stroke-width="3.5" stroke-dasharray="8 15" stroke-linecap="round" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 1; 1; 0; 0" keyTimes="0; 0.05; 0.22; 0.25; 1" dur="20s" repeatCount="indefinite" />
  <animate attributeName="stroke-dashoffset" values="0; -50" dur="0.8s" repeatCount="indefinite" />
  
  <line x1="180" y1="255" x2="300" y2="278" />
  <line x1="420" y1="255" x2="300" y2="278" />
</g>


<!-- ================= PHASE 2: 6th Chakra / Pineal Gland Activation ================= -->
<!-- Located deep in the center of the head. Pulses and builds charge during the hold -->
<circle cx="300" cy="278" r="10" fill="url(#violetGrad)" filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.24; 0.26; 0.50; 0.52; 1" dur="20s" repeatCount="indefinite" />
  <!-- Intense vibration/pulsing during Hold -->
  <animate attributeName="r" values="8; 25; 12; 30; 10" keyTimes="0; 0.25; 0.50; 0.75; 1" dur="0.5s" repeatCount="indefinite" />
</circle>


<!-- ================= PHASE 3: Zeus Lightning Sparks (Crown Activation) ================= -->
<!-- Visualizing spiritual lightning arcs hitting the crown chakra -->
<g stroke="#FFFFFF" stroke-width="2.5" fill="none" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 0; 1; 0; 0" keyTimes="0; 0.50; 0.52; 0.54; 0.56; 0.59; 1" dur="20s" repeatCount="indefinite" />
  
  <!-- Left Bolt -->
  <path d="M 250 80 L 270 140 L 265 170 L 300 215" />
  <!-- Right Bolt -->
  <path d="M 350 70 L 330 130 L 335 180 L 300 215" />
</g>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Crown Line -->
  <line x1="330" y1="215" x2="505" y2="220" />
  <!-- Third Eye Line -->
  <line x1="315" y1="255" x2="505" y2="260" />
  <!-- 6th Chakra Line -->
  <line x1="315" y1="278" x2="505" y2="283" />
  <!-- Zeus Field Line -->
  <line x1="335" y1="120" x2="505" y2="125" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Zeus Field Label -->
  <text x="510" y="124" fill="#FFF59D" filter="url(#glow)">Zeus Activation Field</text>
  <text x="510" y="139" font-weight="normal" fill="#888">Spiritual lightning charging the Crown</text>

  <!-- Crown Label -->
  <text x="510" y="224" fill="#FFFFFF">7th Crown (Brain Area)</text>
  <text x="510" y="239" font-weight="normal" fill="#888">Floods with golden-white light on exhale</text>

  <!-- Third Eye Label -->
  <text x="510" y="264">Third Eye (Inlet)</text>
  <text x="510" y="279" font-weight="normal" fill="#888">Inhale energy deeply through this point</text>

  <!-- 6th Chakra Label -->
  <text x="510" y="304" fill="#E040FB">6th Chakra &amp; Pineal Gland</text>
  <text x="510" y="319" font-weight="normal" fill="#888">Mid-head point; holds and vibrates energy</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 5s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="20s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#8C9EFF" text-anchor="middle" filter="url(#glow)">
      PHASE 1: INHALE INTO THIRD EYE &amp; 6TH CHAKRA
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Inhale deeply through your Third Eye, drawing the energy straight back.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      Pull the breath halfway into your head, targeting the 6th Chakra.
    </text>
  </g>

  <!-- PHASE 2 TEXTS (5s - 10s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.24; 0.26; 0.48; 0.50; 1" dur="20s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#E040FB" text-anchor="middle" filter="url(#glow)">
      PHASE 2: HOLD AND CONDENSE ENERGY
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Hold your breath for a count of 5. Feel the energy charge your pineal gland.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      Let the high-frequency bioelectricity build pressure in the center of your head.
    </text>
  </g>

  <!-- PHASE 3 TEXTS (10s - 15s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.49; 0.51; 0.73; 0.75; 1" dur="20s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#glow)">
      PHASE 3: EXHALE &amp; FLOOD THE CROWN WITH LIGHT
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Exhale slowly. Direct the accumulated energy straight up to the crown.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Visualize a brilliant, blissful white-gold light flooding your brain and upper skull."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (15s - 20s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.74; 0.76; 0.98; 1" dur="20s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle" filter="url(#glow)">
      PHASE 4: MEDITATE ON THE BLISSFUL ENERGY
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Relax completely. Focus on the wonderful, natural sensation of deep well-being.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "Enjoy the golden glow of Father Zeus. Let it integrate throughout your brain."
    </text>
  </g>
</g>

<!-- Side notes -->
<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#FFF59D" font-weight="bold">Bringer of Light:</tspan>
  <tspan x="40" dy="18">The soul is made of light.</tspan>
  <tspan x="40" dy="18">"Zeus's aura is extremely</tspan>
  <tspan x="40" dy="18">bright when He manifests."</tspan>
</text>

<text x="480" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="480" dy="0" fill="#E040FB" font-weight="bold">Pineal &amp; Crown:</tspan>
  <tspan x="480" dy="18">This specific flow stimulates</tspan>
  <tspan x="480" dy="18">natural brain chemistry,</tspan>
  <tspan x="480" dy="18">producing deep well-being.</tspan>
</text>

</svg>
