<meta charset="UTF-8">
<title>Astral Projection — Chakra Unlocking (Meditation 1)</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Astral Projection — Chakra Unlocking Technique</title>
<desc>A 24-second meditation loop. Phase 1: Deep trance induction. Phases 2-3: Staggered stopping and counter-rotation of the 7 chakra knobs. Phase 4: Release and upward float of the cyan astral body.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="6" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Astral Indigo-Cyan Gradient -->
  <radialGradient id="astralGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.8"/>
    <stop offset="60%" stop-color="#2979FF" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Meditating Figure Silhouette -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
  </g>

  <!-- Definition of a Chakra Knob (Default state: rotates clockwise, has indicator notch) -->
  <g id="knob-template">
    <circle cx="0" cy="0" r="14" fill="#111" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-13" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#FFF"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= SCENE: SEPARATING ASTRAL BODY ================= -->
<!-- Slowly appears and glides upward starting at Phase 4 (18.5s - 24s) -->
<g id="astral-soul-body" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0.75; 0.75; 0" keyTimes="0; 0.77; 0.79; 0.93; 1" dur="24s" repeatCount="indefinite" />
  <animateTransform attributeName="transform" type="translate"
                    values="0,0; 0,0; 0,-30; 0,-95"
                    keyTimes="0; 0.77; 0.81; 1"
                    dur="24s" repeatCount="indefinite" />

  <!-- Astral Outline & Glow -->
  <use href="#meditating-figure" fill="none" stroke="#00E5FF" stroke-width="2" filter="url(#glow)"/>
  <circle cx="300" cy="450" r="140" fill="url(#astralGrad)" filter="url(#heavyGlow)" opacity="0.6"/>
</g>


<!-- ================= THE PHYSICAL MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================= CHAKRA UNLOCKING FLASHES (SHOCKWAVES) ================= -->
<!-- Expand radially when each knob completes its anticlockwise click -->
<!-- sahastara (Crown) flash at 5.0s -->
<circle cx="300" cy="215" r="10" fill="none" stroke="#E040FB" stroke-width="2" opacity="0" filter="url(#glow)">
  <animate attributeName="r" values="10; 80" keyTimes="0; 0.208; 0.260; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.208; 0.250; 1" dur="24s" repeatCount="indefinite" />
</circle>

<!-- Ajna (Third Eye) flash at 7.0s -->
<circle cx="300" cy="255" r="10" fill="none" stroke="#3F51B5" stroke-width="2" opacity="0" filter="url(#glow)">
  <animate attributeName="r" values="10; 80" keyTimes="0; 0.291; 0.343; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.291; 0.333; 1" dur="24s" repeatCount="indefinite" />
</circle>

<!-- Vishuddha (Throat) flash at 9.0s -->
<circle cx="300" cy="315" r="10" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0" filter="url(#glow)">
  <animate attributeName="r" values="10; 80" keyTimes="0; 0.375; 0.427; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.375; 0.417; 1" dur="24s" repeatCount="indefinite" />
</circle>

<!-- Anahata (Heart) flash at 11.0s -->
<circle cx="300" cy="375" r="10" fill="none" stroke="#00E676" stroke-width="2" opacity="0" filter="url(#glow)">
  <animate attributeName="r" values="10; 80" keyTimes="0; 0.458; 0.510; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.458; 0.500; 1" dur="24s" repeatCount="indefinite" />
</circle>

<!-- Manipura (Solar Plexus) flash at 13.0s -->
<circle cx="300" cy="455" r="10" fill="none" stroke="#FFD54F" stroke-width="2" opacity="0" filter="url(#glow)">
  <animate attributeName="r" values="10; 80" keyTimes="0; 0.542; 0.594; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.542; 0.583; 1" dur="24s" repeatCount="indefinite" />
</circle>

<!-- Swadhisthana (Sacral) flash at 15.0s -->
<circle cx="300" cy="545" r="10" fill="none" stroke="#FF9100" stroke-width="2" opacity="0" filter="url(#glow)">
  <animate attributeName="r" values="10; 80" keyTimes="0; 0.625; 0.677; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.625; 0.667; 1" dur="24s" repeatCount="indefinite" />
</circle>

<!-- Muladhara (Root) flash at 17.0s -->
<circle cx="300" cy="650" r="10" fill="none" stroke="#FF1744" stroke-width="2" opacity="0" filter="url(#glow)">
  <animate attributeName="r" values="10; 80" keyTimes="0; 0.708; 0.760; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.708; 0.750; 1" dur="24s" repeatCount="indefinite" />
</circle>


<!-- ================= CHAKRA KNOBS WITH EMBEDDED ROTATION TIMING ================= -->
<!-- Crown (Violet) -->
<g transform="translate(300, 215)">
  <use href="#knob-template" stroke="#E040FB" filter="url(#glow)"/>
  <animateTransform attributeName="transform" type="rotate" additive="sum"
                    values="0; 720; 720; 630; 630" 
                    keyTimes="0; 0.166; 0.208; 0.271; 1" 
                    dur="24s" repeatCount="indefinite" />
</g>

<!-- Third Eye (Indigo) -->
<g transform="translate(300, 255)">
  <use href="#knob-template" stroke="#3F51B5" filter="url(#glow)"/>
  <animateTransform attributeName="transform" type="rotate" additive="sum"
                    values="0; 1080; 1080; 990; 990" 
                    keyTimes="0; 0.250; 0.291; 0.354; 1" 
                    dur="24s" repeatCount="indefinite" />
</g>

<!-- Throat (Blue) -->
<g transform="translate(300, 315)">
  <use href="#knob-template" stroke="#00E5FF" filter="url(#glow)"/>
  <animateTransform attributeName="transform" type="rotate" additive="sum"
                    values="0; 1440; 1440; 1350; 1350" 
                    keyTimes="0; 0.333; 0.375; 0.438; 1" 
                    dur="24s" repeatCount="indefinite" />
</g>

<!-- Heart (Green) -->
<g transform="translate(300, 375)">
  <use href="#knob-template" stroke="#00E676" filter="url(#glow)"/>
  <animateTransform attributeName="transform" type="rotate" additive="sum"
                    values="0; 1800; 1800; 1710; 1710" 
                    keyTimes="0; 0.417; 0.458; 0.521; 1" 
                    dur="24s" repeatCount="indefinite" />
</g>

<!-- Solar Plexus (Yellow) -->
<g transform="translate(300, 455)">
  <use href="#knob-template" stroke="#FFD54F" filter="url(#glow)"/>
  <animateTransform attributeName="transform" type="rotate" additive="sum"
                    values="0; 2160; 2160; 2070; 2070" 
                    keyTimes="0; 0.500; 0.542; 0.604; 1" 
                    dur="24s" repeatCount="indefinite" />
</g>

<!-- Sacral (Orange) -->
<g transform="translate(300, 545)">
  <use href="#knob-template" stroke="#FF9100" filter="url(#glow)"/>
  <animateTransform attributeName="transform" type="rotate" additive="sum"
                    values="0; 2520; 2520; 2430; 2430" 
                    keyTimes="0; 0.583; 0.625; 0.688; 1" 
                    dur="24s" repeatCount="indefinite" />
</g>

<!-- Root (Red) -->
<g transform="translate(300, 650)">
  <use href="#knob-template" stroke="#FF1744" filter="url(#glow)"/>
  <animateTransform attributeName="transform" type="rotate" additive="sum"
                    values="0; 2880; 2880; 2790; 2790" 
                    keyTimes="0; 0.667; 0.708; 0.771; 1" 
                    dur="24s" repeatCount="indefinite" />
</g>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Crown Line -->
  <line x1="315" y1="215" x2="505" y2="220" />
  <!-- Heart Line -->
  <line x1="315" y1="375" x2="505" y2="380" />
  <!-- Root Line -->
  <line x1="315" y1="650" x2="505" y2="655" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Crown Label -->
  <text x="510" y="224" fill="#E040FB">Sahasrara (Crown Lock)</text>
  <text x="510" y="239" font-weight="normal" fill="#888">Unlocks first. Stops &amp; counter-rotates</text>

  <!-- Heart Label -->
  <text x="510" y="384" fill="#00E676">Anahata (Heart Lock)</text>
  <text x="510" y="399" font-weight="normal" fill="#888">Middle seal. Calms emotional gravity</text>

  <!-- Root Label -->
  <text x="510" y="654" fill="#FF1744">Muladhara (Root Lock)</text>
  <text x="510" y="669" font-weight="normal" fill="#888">Final physical anchor point</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 4s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.15; 0.17; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00E5FF" text-anchor="middle" filter="url(#glow)">
      PHASE 1: ENTER THE DEEP TRANCE STATE
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Get comfortable. Relax until physical awareness fades and your body feels asleep.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Your astral body is held locked inside the physical shell by the 7 spinning chakras."
    </text>
  </g>

  <!-- PHASE 2 TEXTS (4s - 11s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.16; 0.18; 0.44; 0.46; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#E040FB" text-anchor="middle" filter="url(#glow)">
      PHASE 2: UNLOCK THE UPPER CHAKRA VALVE KNOBS
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Visualize Crown, Third Eye and Throat. Stop each spinning knob one by one.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Turn each valve 1/4 of a turn anticlockwise, releasing the hold like a handle."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (11s - 18s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.45; 0.47; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00E676" text-anchor="middle" filter="url(#glow)">
      PHASE 3: OPEN THE FINAL LOWER SEALS
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Repeat with Heart, Solar Plexus, Sacral and Root. Turn and unlock.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#00E5FF" font-weight="bold" text-anchor="middle">
      "Feel the physical lock snapping open. All resistance is dissolved."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (18s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.74; 0.76; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle" filter="url(#glow)">
      PHASE 4: LET GO AND SLIP OUT EFFORTLESSLY
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Relax completely. Let go of any physical fear. Try to step or slide out.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "Feel your conscious self floating upward, leaving the physical container below."
    </text>
  </g>
</g>

<!-- Side notes -->
<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#00E5FF" font-weight="bold">No Hesitation:</tspan>
  <tspan x="40" dy="18">Any fear or second-guessing</tspan>
  <tspan x="40" dy="18">acts like a brake, trapping</tspan>
  <tspan x="40" dy="18">your energy back inside.</tspan>
</text>

<text x="480" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="480" dy="0" fill="#FFF59D" font-weight="bold">Astral Sensation:</tspan>
  <tspan x="480" dy="18">Once unlocked, a strange,</tspan>
  <tspan x="480" dy="18">weightless vibration will</tspan>
  <tspan x="480" dy="18">sweep over your system.</tspan>
</text>

</svg>
