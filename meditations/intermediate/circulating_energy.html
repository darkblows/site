<meta charset="UTF-8">
<title>Circulating Energy — Microcosmic Orbit</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Circulating Energy Meditation — Microcosmic Orbit Energy Circuit</title>
<desc>A 24-second highly detailed animation. Electric teal energy flows down the front Ren Mai channel. A brilliant miniature Sun ignites at the perineum. Fiery golden energy ascends the spine along the Du Mai channel, completing the microcosmic orbit.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="6" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Perineum Sun Radial Gradient -->
  <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="25%" stop-color="#FFF59D" stop-opacity="0.9"/>
    <stop offset="65%" stop-color="#FFAB00" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#FF6D00" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Major Chakra Node -->
  <g id="major-node">
    <circle cx="0" cy="0" r="9" fill="#FFFFFF" stroke="#00E5FF" stroke-width="2" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="3" fill="#FFFFFF" filter="url(#glow)"/>
  </g>

  <!-- Reusable Spinal Chakra Node -->
  <g id="spinal-node">
    <circle cx="0" cy="0" r="9" fill="#FFFFFF" stroke="#FF9100" stroke-width="2" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="3" fill="#FFFFFF" filter="url(#glow)"/>
  </g>

  <!-- Reusable Base Figure (Dark Silhouette) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================= SCENE 1: FRONT DESCENT FLOW (Ren Mai) ================= -->
<!-- Electric Teal stream curving in front of the chakras (left side of the orbit) -->
<!-- Active in Phase 1 (Descent) and Phase 4 (Orbit) -->
<g stroke="#00E5FF" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="500" stroke-dashoffset="500" filter="url(#glow)" fill="none">
  <!-- Sequential Descent (0s - 8s) -->
  <path d="M 300 215 C 240 300, 240 550, 300 650">
    <animate attributeName="stroke-dashoffset" values="500; 500; 0; 0; 0; 500" keyTimes="0; 0.05; 0.28; 0.80; 0.95; 1" dur="24s" repeatCount="indefinite" />
  </path>
  
  <!-- Continuous Looping Stream in Phase 4 (20s - 24s) -->
  <path d="M 300 215 C 240 300, 240 550, 300 650" stroke-dasharray="15 30" opacity="0">
    <animate attributeName="opacity" values="0; 0; 0; 1; 0" keyTimes="0; 0.80; 0.83; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <animate attributeName="stroke-dashoffset" values="0; -100" dur="0.8s" repeatCount="indefinite" />
  </path>
</g>


<!-- ================= SCENE 2: THE PERINEUM SUN ================= -->
<!-- Located at Y=650, ignites and flares brightly during Phase 2 (8s - 12s) -->
<circle cx="300" cy="650" r="10" fill="url(#sunGrad)" filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0.2; 0" keyTimes="0; 0.31; 0.33; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="r" values="10; 40; 25; 45; 10" dur="1s" repeatCount="indefinite" />
</circle>


<!-- ================= SCENE 3: BACK SPINAL ASCENT FLOW (Du Mai) ================= -->
<!-- Fiery Golden-Orange stream curving up the spine/back (right side of the orbit) -->
<!-- Active in Phase 3 (Ascent) and Phase 4 (Orbit) -->
<g stroke="#FF9100" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="500" stroke-dashoffset="500" filter="url(#glow)" fill="none">
  <!-- Sequential Ascent (12s - 20s) -->
  <path d="M 300 650 C 360 550, 360 300, 300 215">
    <animate attributeName="stroke-dashoffset" values="500; 500; 0; 0; 500" keyTimes="0; 0.50; 0.73; 0.80; 1" dur="24s" repeatCount="indefinite" />
  </path>
  
  <!-- Continuous Looping Stream in Phase 4 (20s - 24s) -->
  <path d="M 300 650 C 360 550, 360 300, 300 215" stroke-dasharray="15 30" opacity="0">
    <animate attributeName="opacity" values="0; 0; 0; 1; 0" keyTimes="0; 0.80; 0.83; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <animate attributeName="stroke-dashoffset" values="0; -100" dur="0.8s" repeatCount="indefinite" />
  </path>
</g>


<!-- ================= CONSECUTIVE CHAKRA NODES LIGHT-UP ================= -->
<!-- Front Channel Nodes (Teal) -->
<g opacity="0.3">
  <!-- Dynamically brightens during front descent (Phase 1) -->
  <use href="#major-node" x="300" y="215" /> <!-- Crown -->
  <use href="#major-node" x="300" y="255" /> <!-- Third Eye -->
  <use href="#major-node" x="300" y="315" /> <!-- Throat -->
  <use href="#major-node" x="300" y="375" /> <!-- Heart -->
  <use href="#major-node" x="300" y="455" /> <!-- Solar Plexus -->
  <use href="#major-node" x="300" y="545" /> <!-- Sacral -->
  <use href="#major-node" x="300" y="680" /> <!-- Root -->
</g>

<!-- Individual node highlight animations during Phase 1 descent -->
<g filter="url(#glow)">
  <!-- Third Eye -->
  <circle cx="300" cy="255" r="9" fill="#00E5FF" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.05; 0.28" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Throat -->
  <circle cx="300" cy="315" r="9" fill="#00E5FF" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.09; 0.28" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Heart -->
  <circle cx="300" cy="375" r="9" fill="#00E5FF" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.13; 0.28" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Solar Plexus -->
  <circle cx="300" cy="455" r="9" fill="#00E5FF" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.17; 0.28" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Sacral -->
  <circle cx="300" cy="545" r="9" fill="#00E5FF" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.21; 0.28" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Root -->
  <circle cx="300" cy="680" r="9" fill="#00E5FF" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.25; 0.28" dur="24s" repeatCount="indefinite"/></circle>
</g>

<!-- Back/Spinal Channel Nodes (Orange/Yang) -->
<!-- Highlight sequentially during Phase 3 ascent -->
<g filter="url(#glow)">
  <!-- Spinal Sacral -->
  <circle cx="300" cy="545" r="9" fill="#FF9100" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.54; 0.73" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Spinal Solar -->
  <circle cx="300" cy="455" r="9" fill="#FF9100" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.58; 0.73" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Spinal Heart -->
  <circle cx="300" cy="375" r="9" fill="#FF9100" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.62; 0.73" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Spinal Throat -->
  <circle cx="300" cy="315" r="9" fill="#FF9100" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.66; 0.73" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Spinal Third Eye -->
  <circle cx="300" cy="255" r="9" fill="#FF9100" opacity="0"><animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.70; 0.73" dur="24s" repeatCount="indefinite"/></circle>
</g>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Crown Line -->
  <line x1="330" y1="215" x2="505" y2="220" />
  <!-- Front Pathway Line -->
  <line x1="260" y1="375" x2="505" y2="380" />
  <!-- Spinal Pathway Line -->
  <line x1="340" y1="455" x2="505" y2="460" />
  <!-- Perineum Line -->
  <line x1="320" y1="650" x2="505" y2="655" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Crown Label -->
  <text x="510" y="224" fill="#00E5FF" filter="url(#glow)">Crown Chakra (Origin)</text>
  <text x="510" y="239" font-weight="normal" fill="#888">Initial focus; tingling &amp; intense bliss</text>

  <!-- Front Channel Label -->
  <text x="510" y="384" fill="#00E5FF">Front Channel (Ren Mai)</text>
  <text x="510" y="399" font-weight="normal" fill="#888">Teal energy flows down front chakras</text>

  <!-- Spinal Channel Label -->
  <text x="510" y="464" fill="#FF9100">Spinal Channel (Du Mai)</text>
  <text x="510" y="479" font-weight="normal" fill="#888">Fiery gold energy ascends up back/spine</text>

  <!-- Perineum Label -->
  <text x="510" y="654" fill="#FFF59D" filter="url(#glow)">Perineum (Power Point)</text>
  <text x="510" y="669" font-weight="normal" fill="#888">Visualized as brilliant as the Sun</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 8s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.31; 0.33; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00E5FF" text-anchor="middle" filter="url(#glow)">
      PHASE 1: DESCENT DOWN THE FRONT CHANNEL
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Direct the energy down the front of the body, chakra by chakra, starting from the Crown.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      Crown ➔ Third Eye ➔ Throat ➔ Heart ➔ Solar Plexus ➔ Sacral ➔ Perineum.
    </text>
  </g>

  <!-- PHASE 2 TEXTS (8s - 12s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.31; 0.33; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFF59D" text-anchor="middle" filter="url(#glow)">
      PHASE 2: ACTIVATE &amp; IGNITE THE PERINEUM SUN
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Concentrate on the perineum power point. Pause here for a few moments.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Visualize the energy glowing intensely, as bright and powerful as the Sun."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (12s - 20s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.49; 0.51; 0.81; 0.83; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FF9100" text-anchor="middle" filter="url(#glow)">
      PHASE 3: ASCEND UP THE SPINAL CHANNEL
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Direct the energy upwards from the base along the back of the spine, chakra by chakra.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      Sacral ➔ Solar Plexus ➔ Heart ➔ Throat ➔ Third Eye ➔ Crown.
    </text>
  </g>

  <!-- PHASE 4 TEXTS (20s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.81; 0.83; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle" filter="url(#glow)">
      PHASE 4: RUN THE MICROCOSMIC ORBIT
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Let the energy flow continuously without interruption: down the front, up the spine.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "Wherever your mind focuses, the energy will follow. This is the base of all power."
    </text>
  </g>
</g>

<!-- Side notes -->
<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#00E5FF" font-weight="bold">Yin Descent:</tspan>
  <tspan x="40" dy="18">The front channel flows</tspan>
  <tspan x="40" dy="18">downwards, cooling</tspan>
  <tspan x="40" dy="18">and soothing the body.</tspan>
</text>

<text x="485" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="485" dy="0" fill="#FF9100" font-weight="bold">Yang Ascent:</tspan>
  <tspan x="485" dy="18">The spinal channel rises</tspan>
  <tspan x="485" dy="18">upwards, heating and</tspan>
  <tspan x="485" dy="18">vitalizing your soul.</tspan>
</text>

</svg>
</body>
</html>
