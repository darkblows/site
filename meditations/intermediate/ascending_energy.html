<title>Ascending Energy Meditation — High-Fidelity Guide</title>

<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Advanced Ascending Energy Meditation — High-Fidelity Anatomical Guide</title>
<desc>A highly complex 32-second loop illustrating abstract energy transmutation. Features a double-helix spinal ascent, dual-rotating particle rings at the 8th chakra, parallax toroidal aura flow, and dotted-line anatomical labels on the right.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="8" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Gold-White Energy Gradients -->
  <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="35%" stop-color="#FFF59D" stop-opacity="0.9"/>
    <stop offset="70%" stop-color="#FFD54F" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="goldWhiteGrad" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.2"/>
    <stop offset="50%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.8"/>
  </linearGradient>

  <radialGradient id="eggAuraGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
    <stop offset="75%" stop-color="#FFF9C4" stop-opacity="0.02"/>
    <stop offset="92%" stop-color="#FFF59D" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.35"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 412 300 410 Q345 412 362 420 Q365 440 350 460 L365 510 Q375 550 355 590 Q300 610 245 590 Z" fill="#6B6A65" opacity="0.4"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= PROTECTIVE SHIELD (Aura Expansion) Phase 4 ================= -->
<!-- Grows massively during Phase 4 when returning energy integrates into the aura -->
<ellipse cx="300" cy="420" rx="160" ry="220" fill="url(#eggAuraGrad)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0; 0.2; 0.85; 0" keyTimes="0; 0.25; 0.50; 0.70; 0.85; 0.95" dur="32s" repeatCount="indefinite"/>
  <animate attributeName="rx" values="160; 160; 160; 160; 250; 160" keyTimes="0; 0.25; 0.50; 0.70; 0.85; 0.95" dur="32s" repeatCount="indefinite"/>
  <animate attributeName="ry" values="220; 220; 220; 220; 310; 220" keyTimes="0; 0.25; 0.50; 0.70; 0.85; 0.95" dur="32s" repeatCount="indefinite"/>
</ellipse>


<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================= PHASE 1: Bioelectric Accumulation at the Base ================= -->
<!-- Pulsing red-gold light at the perineum, speeding up until climax -->
<circle cx="300" cy="660" r="5" fill="#FF3D00" filter="url(#glow)">
  <animate attributeName="r" values="5; 15; 5; 20; 5; 25; 5; 35; 0; 0" 
           keyTimes="0; 0.05; 0.08; 0.12; 0.15; 0.18; 0.20; 0.24; 0.25; 1" dur="32s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8; 0.9; 0.7; 1; 0.7; 1; 0.7; 1; 0; 0" 
           keyTimes="0; 0.05; 0.08; 0.12; 0.15; 0.18; 0.20; 0.24; 0.25; 1" dur="32s" repeatCount="indefinite"/>
</circle>

<!-- Blinding White Climax Flash at 8 seconds (0.25) -->
<circle cx="300" cy="660" r="0" fill="#FFFFFF" filter="url(#heavyGlow)">
  <animate attributeName="r" values="0; 0; 90; 0; 0" keyTimes="0; 0.24; 0.26; 0.35; 1" dur="32s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0; 0; 1; 0; 0" keyTimes="0; 0.24; 0.25; 0.35; 1" dur="32s" repeatCount="indefinite"/>
</circle>


<!-- ================= PHASE 2: Spinal Energy Ascent (Double Helix) ================= -->
<!-- Central core beam -->
<line x1="300" y1="660" x2="300" y2="110" stroke="url(#goldWhiteGrad)" stroke-width="5" stroke-linecap="round" stroke-dasharray="550" stroke-dashoffset="550" filter="url(#glow)">
  <animate attributeName="stroke-dashoffset" values="550; 550; 0; 0; 550" keyTimes="0; 0.25; 0.45; 0.55; 1" dur="32s" repeatCount="indefinite"/>
</line>

<!-- Helix Path A (Sinusoidal rising current) -->
<path d="M 300 660 Q 280 600, 300 540 T 300 420 T 300 300 T 300 180 T 300 110" fill="none" stroke="#FFF59D" stroke-width="2.5" stroke-dasharray="20 15" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.25; 0.28; 0.55; 0.58; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="stroke-dashoffset" values="0; -200" dur="1.5s" repeatCount="indefinite" />
</path>

<!-- Helix Path B (Mirrored sinusoidal rising current) -->
<path d="M 300 660 Q 320 600, 300 540 T 300 420 T 300 300 T 300 180 T 300 110" fill="none" stroke="#FFF59D" stroke-width="2.5" stroke-dasharray="20 15" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.25; 0.28; 0.55; 0.58; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="stroke-dashoffset" values="0; -200" dur="1.5s" repeatCount="indefinite" />
</path>


<!-- ================= PHASE 3: 8th Golden Chakra Expansion ================= -->
<!-- Golden Core above the head at Y=110 -->
<circle cx="300" cy="110" r="10" fill="url(#goldGrad)" filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0; 0.9; 0.9; 0" keyTimes="0; 0.25; 0.44; 0.47; 0.85; 1" dur="32s" repeatCount="indefinite"/>
  <animate attributeName="r" values="10; 10; 10; 65; 65; 10" keyTimes="0; 0.25; 0.45; 0.55; 0.85; 1" dur="32s" repeatCount="indefinite"/>
</circle>

<!-- Swirling Particle Rings in the 8th Chakra -->
<g opacity="0" filter="url(#glow)">
  <animate attributeName="opacity" values="0; 0; 0; 1; 1; 0" keyTimes="0; 0.25; 0.48; 0.52; 0.85; 1" dur="32s" repeatCount="indefinite"/>
  
  <!-- Clockwise Ring -->
  <circle cx="300" cy="110" r="45" fill="none" stroke="#FFD54F" stroke-width="2" stroke-dasharray="6 12">
    <animateTransform attributeName="transform" type="rotate" from="0 300 110" to="360 300 110" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Counter-Clockwise Ring -->
  <circle cx="300" cy="110" r="58" fill="none" stroke="#FFFFFF" stroke-dasharray="15 30" stroke-opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="360 300 110" to="0 300 110" dur="4s" repeatCount="indefinite" />
  </circle>
</g>


<!-- ================= PHASE 3 & 4: Parallax Toroidal Aura Circulation ================= -->
<!-- Inner, Faster Torus Flow -->
<g stroke="url(#goldWhiteGrad)" stroke-width="4.5" stroke-dasharray="15 25" stroke-linecap="round" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.53; 0.55; 0.85; 0.90; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="stroke-dashoffset" values="0; -140" dur="1s" repeatCount="indefinite" />
  
  <!-- Left Inner Path -->
  <path d="M 300 110 C 140 150, 140 660, 300 680" fill="none" />
  <!-- Right Inner Path -->
  <path d="M 300 110 C 460 150, 460 660, 300 680" fill="none" />
</g>

<!-- Outer, Slower Torus Flow -->
<g stroke="#FFD54F" stroke-width="2.5" stroke-dasharray="10 30" stroke-linecap="round" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0.8; 0.8; 0; 0" keyTimes="0; 0.55; 0.57; 0.83; 0.88; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="stroke-dashoffset" values="0; -100" dur="2s" repeatCount="indefinite" />
  
  <!-- Left Outer Path -->
  <path d="M 300 110 C 100 150, 100 660, 300 680" fill="none" />
  <!-- Right Outer Path -->
  <path d="M 300 110 C 500 150, 500 660, 300 680" fill="none" />
</g>

<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#555" stroke-width="1" stroke-dasharray="3 3">
  <!-- 8th Chakra Line -->
  <line x1="365" y1="110" x2="495" y2="115" />
  <!-- 7th Crown Line -->
  <line x1="345" y1="215" x2="495" y2="220" />
  <!-- Spine Line -->
  <line x1="315" y1="410" x2="495" y2="415" />
  <!-- Perineum Line -->
  <line x1="315" y1="660" x2="495" y2="665" />
  <!-- Soles Line -->
  <line x1="385" y1="720" x2="495" y2="725" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- 8th Chakra Label -->
  <text x="500" y="119" fill="#FFF59D" filter="url(#glow)">8th Chakra [Golden]</text>
  <text x="500" y="134" font-weight="normal" fill="#888">2-foot sphere above the head</text>

  <!-- 7th Crown Label -->
  <text x="500" y="224">7th Crown Chakra</text>
  <text x="500" y="239" font-weight="normal" fill="#888">Outlet and illumination point</text>

  <!-- Spine Label -->
  <text x="500" y="419">Spinal Column</text>
  <text x="500" y="434" font-weight="normal" fill="#888">Path of white-gold energy</text>

  <!-- Perineum Label -->
  <text x="500" y="669" fill="#FF5252">Perineum (Coccyx Base)</text>
  <text x="500" y="684" font-weight="normal" fill="#888">Ignition point of climax energy</text>

  <!-- Soles Label -->
  <text x="500" y="729">Soles of the Feet</text>
  <text x="500" y="744" font-weight="normal" fill="#888">Return channel to the root</text>
</g>

<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 8s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="32s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FF5252" text-anchor="middle">
      PHASE 1: STIMULATE &amp; IGNITE BASE ENERGY
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Focus on the perineum area. Feel the bioelectricity building up rapidly.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      At the exact peak of climax, visualize a burning, brilliant
    </text>
    <text x="360" y="885" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      white-gold spark igniting at the base of your spine.
    </text>
  </g>

  <!-- PHASE 2 TEXTS (8s - 16s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.24; 0.26; 0.48; 0.50; 1" dur="32s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFF59D" text-anchor="middle">
      PHASE 2: INHALE &amp; DRAW UP THE SPINE (DOUBLE HELIX)
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Inhale deeply. Pull the brilliant white-golden energy of the climax upwards.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Draw the current along the spine, through the Crown,"
    </text>
    <text x="360" y="885" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "emerging from the top of your head to the 8th Chakra."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (16s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.49; 0.51; 0.73; 0.75; 1" dur="32s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFD54F" text-anchor="middle">
      PHASE 3: EXPAND THE 8TH GOLDEN CHAKRA &amp; CIRCULATE
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Exhale and expand the 8th Chakra above your head into a 2-foot sphere.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Direct the flow downwards along both sides of your body,"
    </text>
    <text x="360" y="885" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "passing through the soles of your feet, returning to the root."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (24s - 32s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.74; 0.76; 0.98; 1" dur="32s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle">
      PHASE 4: RECIRCULATE &amp; EXPAND AURA
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Inhale again to draw the returned energy back into the base. Repeat the cycle.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "With each cycle, feel your entire protective aura expand."
    </text>
    <text x="360" y="885" font-family="sans-serif" font-size="11" fill="#777" text-anchor="middle">
      (Always direct energy upwards and out through the crown)
    </text>
  </g>
</g>
