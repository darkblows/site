<meta charset="UTF-8">
<title>Aura Cleansing — Spiritual Hygiene</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="680" height="780" viewBox="0 0 680 780" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Meditating figure transitioning from a dirty gray aura to a brilliant white-gold aura using light and vibration</title>
<desc>A 24-second loop showing aura cleansing. Phase 1: Dirty gray aura. Phase 2: Short cleanse with bright white light. Phase 3: Miniature Suns igniting at each chakra. Phase 4: Full cleanse using the RAUM vibration in blinding white-gold light.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="8" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.5"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Gradients for different Aura states -->
  <radialGradient id="dirtyAuraGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#555555" stop-opacity="0.8"/>
    <stop offset="40%" stop-color="#3d3d3d" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="whiteAuraGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="50%" stop-color="#E1F5FE" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="goldAuraGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="40%" stop-color="#FFD54F" stop-opacity="0.8"/>
    <stop offset="70%" stop-color="#FF8F00" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
  </radialGradient>

  <!-- Gradient for the Mini-Suns (Chakras) -->
  <radialGradient id="miniSun" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="30%" stop-color="#FFF59D" stop-opacity="1"/>
    <stop offset="70%" stop-color="#F57F17" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#D84315" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="680" height="780" fill="#0d0d0d"/>


<!-- ================= AURA LAYERS ================= -->

<!-- Phase 1: Dirty/Gray Aura -->
<circle cx="300" cy="450" r="180" fill="url(#dirtyAuraGrad)">
  <animate attributeName="opacity" values="1; 1; 0; 0; 0; 1" keyTimes="0; 0.22; 0.25; 0.95; 0.98; 1" dur="24s" repeatCount="indefinite" />
  <!-- Sluggish pulsing -->
  <animate attributeName="r" values="170; 190; 170" dur="4s" repeatCount="indefinite" />
</circle>

<!-- Phase 2 & 3: White Light Aura -->
<circle cx="300" cy="450" r="280" fill="url(#whiteAuraGrad)" filter="url(#glow)">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0; 0" keyTimes="0; 0.24; 0.26; 0.73; 0.75; 0.98; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="r" values="260; 300; 260" dur="3s" repeatCount="indefinite" />
</circle>

<!-- Phase 4: Full Cleanse (White-Gold Aura) -->
<circle cx="300" cy="450" r="350" fill="url(#goldAuraGrad)" filter="url(#heavyGlow)">
  <animate attributeName="opacity" values="0; 0; 0; 1; 1; 0" keyTimes="0; 0.74; 0.76; 0.78; 0.95; 1" dur="24s" repeatCount="indefinite" />
  <!-- Powerful pulsing -->
  <animate attributeName="r" values="320; 400; 320" dur="1.5s" repeatCount="indefinite" />
</circle>


<!-- ================= VIBRATION TEXT (RAUM) ================= -->
<!-- Expanding outward during Phase 4 -->
<g opacity="0">
  <animate attributeName="opacity" values="0; 0; 0; 0; 0.8; 0" keyTimes="0; 0.74; 0.76; 0.78; 0.95; 1" dur="24s" repeatCount="indefinite" />
  
  <!-- Outer expanding text -->
  <text x="300" y="450" font-family="sans-serif" font-size="60" font-weight="bold" fill="#FFFFFF" opacity="0.3" text-anchor="middle" dominant-baseline="middle">
    RR-AHH-UUU-MMM
    <animateTransform attributeName="transform" type="scale" values="0.5,0.5; 3,3" dur="2s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0.8; 0" dur="2s" repeatCount="indefinite" />
  </text>
  
  <!-- Inner steady text -->
  <text x="300" y="450" font-family="sans-serif" font-size="40" font-weight="bold" fill="#FFF59D" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">
    RR-AHH-UUU-MMM
  </text>
</g>


<!-- ================= THE MEDITATING FIGURE ================= -->
<!-- Base figure -->
<use href="#meditating-figure" />

<!-- Glowing body overlay (lights up when cleansed) -->
<use href="#meditating-figure" fill="#FFFFFF" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0.8; 0.8; 1; 0" keyTimes="0; 0.24; 0.26; 0.74; 0.76; 1" dur="24s" repeatCount="indefinite"/>
  <animate attributeName="fill" values="#FFFFFF; #FFFFFF; #FFFFFF; #FFFFFF; #FFF59D; #FFFFFF" keyTimes="0; 0.24; 0.26; 0.74; 0.76; 1" dur="24s" repeatCount="indefinite"/>
</use>


<!-- ================= CHAKRAS (Mini-Suns) Phase 3 & 4 ================= -->
<g opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 1; 0" keyTimes="0; 0.48; 0.50; 0.75; 0.95; 1" dur="24s" repeatCount="indefinite"/>
  
  <!-- Shared pulse animation for all chakras -->
  <g>
    <!-- Root -->
    <circle cx="300" cy="605" fill="url(#miniSun)" filter="url(#glow)">
      <animate attributeName="r" values="10; 25; 10" dur="1s" repeatCount="indefinite" />
    </circle>
    <!-- Sacral -->
    <circle cx="300" cy="545" fill="url(#miniSun)" filter="url(#glow)">
      <animate attributeName="r" values="10; 25; 10" dur="1.1s" repeatCount="indefinite" />
    </circle>
    <!-- Solar Plexus -->
    <circle cx="300" cy="455" fill="url(#miniSun)" filter="url(#glow)">
      <animate attributeName="r" values="10; 25; 10" dur="0.9s" repeatCount="indefinite" />
    </circle>
    <!-- Heart -->
    <circle cx="300" cy="375" fill="url(#miniSun)" filter="url(#glow)">
      <animate attributeName="r" values="10; 25; 10" dur="1.2s" repeatCount="indefinite" />
    </circle>
    <!-- Throat -->
    <circle cx="300" cy="315" fill="url(#miniSun)" filter="url(#glow)">
      <animate attributeName="r" values="10; 25; 10" dur="0.85s" repeatCount="indefinite" />
    </circle>
    <!-- Third Eye -->
    <circle cx="300" cy="255" fill="url(#miniSun)" filter="url(#glow)">
      <animate attributeName="r" values="10; 25; 10" dur="1.05s" repeatCount="indefinite" />
    </circle>
    <!-- Crown -->
    <circle cx="300" cy="215" fill="url(#miniSun)" filter="url(#glow)">
      <animate attributeName="r" values="10; 25; 10" dur="0.95s" repeatCount="indefinite" />
    </circle>
  </g>
</g>


<!-- ================= TEXTS & LABELS ================= -->
<text x="340" y="50" font-family="sans-serif" font-size="22" font-weight="bold" fill="#F0F0F0" text-anchor="middle">Aura Cleansing &amp; Hygiene</text>

<!-- Phase 1 Text -->
<text x="340" y="85" font-family="sans-serif" font-size="14" fill="#999999" font-weight="bold" text-anchor="middle" opacity="0">
  <tspan>Phase 1: Dirty/Gray Aura. Vulnerable to negativity and illness.</tspan>
  <animate attributeName="opacity" values="1; 1; 0; 0; 0; 1" keyTimes="0; 0.23; 0.25; 0.98; 0.99; 1" dur="24s" repeatCount="indefinite" />
</text>

<!-- Phase 2 Text -->
<text x="340" y="85" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="middle" opacity="0">
  <tspan>Phase 2: Short Cleanse. Engulfed entirely in bright white light.</tspan>
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.24; 0.26; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
</text>

<!-- Phase 3 Text -->
<text x="340" y="85" font-family="sans-serif" font-size="14" fill="#FFC107" font-weight="bold" text-anchor="middle" opacity="0">
  <tspan>Phase 3: Igniting Chakras. A miniature Sun blazing at each center.</tspan>
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.49; 0.51; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
</text>

<!-- Phase 4 Text -->
<text x="340" y="85" font-family="sans-serif" font-size="14" fill="#FFF59D" font-weight="bold" text-anchor="middle" opacity="0">
  <tspan>Phase 4: Full Cleanse. Vibrating "RAUM" or "SURYA" in white-gold light.</tspan>
  <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.74; 0.76; 0.98; 1" dur="24s" repeatCount="indefinite" />
</text>


<!-- Sidebar Notes -->
<text x="40" y="320" font-family="sans-serif" font-size="12" fill="#888" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#E24B4A" font-weight="bold">WARNING:</tspan>
  <tspan x="40" dy="18">Do NOT use LED bulbs</tspan>
  <tspan x="40" dy="18">for visualization help.</tspan>
  <tspan x="40" dy="18">They damage the eyes.</tspan>
  <tspan x="40" dy="24">Use warm white bulbs</tspan>
  <tspan x="40" dy="18">or actual Sunlight.</tspan>
</text>

<text x="490" y="320" font-family="sans-serif" font-size="12" fill="#888" width="150" opacity="0.8">
  <tspan x="490" dy="0" fill="#FFC107" font-weight="bold">"Light is Power"</tspan>
  <tspan x="490" dy="18">A clean aura acts as</tspan>
  <tspan x="490" dy="18">a shield against curses,</tspan>
  <tspan x="490" dy="18">jealousy, and illness.</tspan>
  <tspan x="490" dy="24">Do this 2x a day.</tspan>
</text>

</svg>
</body>
</html>
