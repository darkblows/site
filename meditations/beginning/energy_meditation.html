<meta charset="UTF-8">
<title>Energy Meditation — Aura Expansion</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="680" height="780" viewBox="0 0 680 780" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Meditating figure absorbing white energy from all sides and expanding the aura</title>
<desc>A 16-second loop showing a breathing meditation. Energy is drawn from top, bottom, left, and right on the inhale. On the exhale, the aura expands. With each breath, the core becomes brighter, eventually shining like the sun.</desc>

<defs>
  <!-- Glow Filter -->
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="8" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Aura Radial Gradient (White/Soft Blue for beginners) -->
  <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
    <stop offset="40%" stop-color="#E1F5FE" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </radialGradient>

  <!-- Sun Core Gradient for the center of the body -->
  <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="30%" stop-color="#FFF59D" stop-opacity="0.9"/>
    <stop offset="70%" stop-color="#FBC02D" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#F57F17" stop-opacity="0"/>
  </radialGradient>

  <!-- Base Meditating Silhouette -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32" stroke="#5F5E5A" stroke-width="1"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
    <ellipse cx="286" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
  </g>
</defs>

<!-- Expanding Aura (Behind the figure) -->
<circle cx="300" cy="450" r="50" fill="url(#auraGrad)" filter="url(#glow)">
  <!-- Aura Radius Animation: Expands on exhale, contracts slightly on 2nd inhale, massive expansion on 2nd exhale -->
  <animate attributeName="r" values="50; 50; 220; 160; 360; 50" keyTimes="0; 0.25; 0.50; 0.75; 0.95; 1" dur="16s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 0; 0.6; 0.3; 0.8; 0" keyTimes="0; 0.25; 0.50; 0.75; 0.95; 1" dur="16s" repeatCount="indefinite" />
</circle>

<!-- Base Meditating Silhouette -->
<use href="#meditating-figure" />

<!-- INHALING ENERGY (Lines from 4 directions) -->
<!-- Visible only during 0-25% (Phase 1) and 50-75% (Phase 3) -->
<g stroke="#FFFFFF" stroke-width="6" stroke-dasharray="15 20" stroke-linecap="round" filter="url(#glow)">
  <animate attributeName="opacity" values="0; 1; 0; 0; 1; 0; 0" keyTimes="0; 0.125; 0.25; 0.50; 0.625; 0.75; 1" dur="16s" repeatCount="indefinite" />
  
  <!-- Flow animation for all incoming energy -->
  <animate attributeName="stroke-dashoffset" values="100; 0" dur="1s" repeatCount="indefinite" />

  <!-- Top Line -->
  <line x1="300" y1="120" x2="300" y2="350" />
  <!-- Bottom Line -->
  <line x1="300" y1="720" x2="300" y2="550" />
  <!-- Left Line -->
  <line x1="50" y1="450" x2="220" y2="450" />
  <!-- Right Line -->
  <line x1="550" y1="450" x2="380" y2="450" />
</g>

<!-- CORE ENERGY: Shines like the Sun -->
<circle cx="300" cy="450" r="20" fill="url(#sunGrad)" filter="url(#glow)">
  <animate attributeName="r" values="0; 60; 60; 120; 120; 0" keyTimes="0; 0.25; 0.50; 0.75; 0.95; 1" dur="16s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 0.7; 0.7; 1; 1; 0" keyTimes="0; 0.25; 0.50; 0.75; 0.95; 1" dur="16s" repeatCount="indefinite" />
</circle>

<!-- ================= TEXTS & LABELS ================= -->
<text x="340" y="50" font-family="sans-serif" font-size="22" font-weight="bold" fill="#F0F0F0" text-anchor="middle">Energy Meditation</text>

<!-- Phase 1: Inhale -->
<text x="340" y="85" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="middle" opacity="0">
  <tspan>Phase 1 (Inhale): Absorbing bright white energy from all sides</tspan>
  <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="16s" repeatCount="indefinite" />
</text>

<!-- Phase 2: Exhale -->
<text x="340" y="85" font-family="sans-serif" font-size="14" fill="#81D4FA" font-weight="bold" text-anchor="middle" opacity="0">
  <tspan>Phase 2 (Exhale): Expanding the Aura outwards</tspan>
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.24; 0.26; 0.48; 0.50; 1" dur="16s" repeatCount="indefinite" />
</text>

<!-- Phase 3: Inhale 2 -->
<text x="340" y="85" font-family="sans-serif" font-size="14" fill="#FFF59D" font-weight="bold" text-anchor="middle" opacity="0">
  <tspan>Phase 3 (Inhale): Energy becomes brighter and more powerful</tspan>
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.49; 0.51; 0.73; 0.75; 1" dur="16s" repeatCount="indefinite" />
</text>

<!-- Phase 4: Exhale 2 -->
<text x="340" y="85" font-family="sans-serif" font-size="14" fill="#FBC02D" font-weight="bold" text-anchor="middle" opacity="0">
  <tspan>Phase 4 (Exhale): Core shines like the Sun, expanding fully</tspan>
  <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.74; 0.76; 0.98; 1" dur="16s" repeatCount="indefinite" />
</text>

<!-- Sidebar Notes (Static) -->
<text x="40" y="320" font-family="sans-serif" font-size="12" fill="#888" width="150">
  <tspan x="40" dy="0">Beginners:</tspan>
  <tspan x="40" dy="18" fill="#ccc">Visualize bright</tspan>
  <tspan x="40" dy="18" fill="#ccc">white light.</tspan>
</text>

<text x="510" y="320" font-family="sans-serif" font-size="12" fill="#888" width="150">
  <tspan x="510" dy="0">Advanced:</tspan>
  <tspan x="510" dy="18" fill="#ccc">Work with colors</tspan>
  <tspan x="510" dy="18" fill="#ccc">to attract specific</tspan>
  <tspan x="510" dy="18" fill="#ccc">energies.</tspan>
</text>

<text x="510" y="550" font-family="sans-serif" font-size="12" fill="#888" width="150" font-style="italic">
  <tspan x="510" dy="0">"Contract & Expand"</tspan>
  <tspan x="510" dy="18">The aura naturally</tspan>
  <tspan x="510" dy="18">flexes with the breath.</tspan>
</text>

</svg>
</body>
</html>
