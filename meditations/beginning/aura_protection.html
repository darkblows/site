<meta charset="UTF-8">
<title>Reflective Aura of Protection — Advanced Meditation</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="680" height="940" viewBox="0 0 680 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Advanced Aura of Protection Meditation Guide with interactive shield defense and text panel</title>
<desc>A highly complex 32-second loop illustrating the Aura of Protection. Features a rotating flare Sun, a fluidly rippling white-gold egg shield, a 6-particle psychic defense barrage with shockwave impacts, and a synchronized meditation guidance panel displaying the exact affirmations.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="8" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Sun Energy Gradient -->
  <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="25%" stop-color="#FFF59D" stop-opacity="0.9"/>
    <stop offset="60%" stop-color="#FFB300" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
  </radialGradient>

  <!-- Reflective Egg Shield Gradient -->
  <radialGradient id="eggAuraGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
    <stop offset="75%" stop-color="#FFF9C4" stop-opacity="0.03"/>
    <stop offset="92%" stop-color="#FFF59D" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.45"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="680" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 660 Q205 620 220 590 Q235 575 260 575 L260 600 Q245 615 245 640 Q245 660 260 665 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M385 660 Q395 620 380 590 Q365 575 340 575 L340 600 Q355 615 355 640 Q355 660 340 665 Z" fill="#5F5E5A" opacity="0.4"/>
    <path d="M225 575 Q210 520 225 480 Q235 455 260 440 L260 460 Q245 475 240 500 Q235 530 245 565 Q250 575 260 578 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M375 575 Q390 520 375 480 Q365 455 340 440 L340 460 Q355 475 360 500 Q365 530 355 565 Q350 575 340 578 Z" fill="#5F5E5A" opacity="0.38"/>
    <path d="M245 590 Q225 550 235 510 L250 460 Q235 440 238 420 Q255 412 300 410 Q345 412 362 420 Q365 440 350 460 L365 510 Q375 550 355 590 Q300 610 245 590 Z" fill="#6B6A65" opacity="0.4"/>
    <path d="M258 420 Q248 360 262 315 Q275 290 300 282 Q325 290 338 315 Q352 360 342 420 Q321 430 300 431 Q279 430 258 420 Z" fill="#888780" opacity="0.32"/>
    <circle cx="300" cy="238" r="42" fill="#B4B2A9" opacity="0.4"/>
    <path d="M262 225 Q262 184 300 178 Q338 184 338 225 Q338 198 300 192 Q262 198 262 225 Z" fill="#2C2C2A" opacity="0.55"/>
  </g>
</defs>

<!-- ================= THE SUN WITH ROTATING FLARES ================= -->
<g transform="translate(100, 150)">
  <!-- Background Glow -->
  <circle cx="0" cy="0" r="110" fill="url(#sunGrad)" filter="url(#heavyGlow)"/>
  
  <!-- Rotating Solar Flares/Rays -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="24s" repeatCount="indefinite" />
    <path d="M-8 -120 L8 -120 L20 0 L-20 0 Z" fill="url(#sunGrad)" filter="url(#glow)"/>
    <path d="M-8 120 L8 120 L20 0 L-20 0 Z" fill="url(#sunGrad)" filter="url(#glow)"/>
    <path d="M-120 -8 L-120 8 L0 20 L0 -20 Z" fill="url(#sunGrad)" filter="url(#glow)"/>
    <path d="M120 -8 L120 8 L0 20 L0 -20 Z" fill="url(#sunGrad)" filter="url(#glow)"/>
    <path d="M-85 -85 L-73 -97 L0 0 Z" stroke="#FFF59D" stroke-width="6" filter="url(#glow)"/>
    <path d="M85 85 L73 97 L0 0 Z" stroke="#FFF59D" stroke-width="6" filter="url(#glow)"/>
  </g>
  
  <!-- Sun Core -->
  <circle cx="0" cy="0" r="32" fill="#FFFFFF" filter="url(#glow)"/>
</g>

<!-- ================= INWARD ENERGY RAYS (Phase 1) ================= -->
<g stroke="#FFF9C4" stroke-width="3.5" stroke-dasharray="12 25" stroke-linecap="round" filter="url(#glow)">
  <animate attributeName="opacity" values="0.8; 0.8; 0; 0; 0.8" keyTimes="0; 0.23; 0.25; 0.75; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="stroke-dashoffset" values="0; -80" dur="1.2s" repeatCount="indefinite" />
  
  <line x1="100" y1="150" x2="300" y2="420" />
  <line x1="130" y1="180" x2="270" y2="330" />
  <line x1="100" y1="150" x2="300" y2="250" stroke-width="2" />
</g>

<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />

<!-- Rising Internal Energy Conduits (Bioelectricity) -->
<g stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6 20" stroke-linecap="round" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0.8; 0.8; 0.2; 0.8; 0" keyTimes="0; 0.15; 0.50; 0.75; 0.95; 1" dur="32s" repeatCount="indefinite"/>
  <animate attributeName="stroke-dashoffset" values="0; -80" dur="1.5s" repeatCount="indefinite" />
  <line x1="300" y1="620" x2="300" y2="220" stroke-width="4"/>
  <line x1="285" y1="580" x2="285" y2="280"/>
  <line x1="315" y1="580" x2="315" y2="280"/>
</g>

<!-- Glowing body overlay (pulsing with white-gold light) -->
<use href="#meditating-figure" fill="#FFF9C4" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0.95; 0.95; 0.95; 0.95; 0" keyTimes="0; 0.22; 0.25; 0.50; 0.95; 1" dur="32s" repeatCount="indefinite"/>
</use>


<!-- ================= PROTECTIVE SHIELD (Egg-shaped Aura) ================= -->
<!-- Appears in Phase 2, defends in Phase 3, holds through Phase 4 -->
<g opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 1; 0" keyTimes="0; 0.23; 0.25; 0.50; 0.95; 1" dur="32s" repeatCount="indefinite" />
  
  <!-- Semitransparent reflective egg body -->
  <ellipse cx="300" cy="420" rx="160" ry="220" fill="url(#eggAuraGrad)" />
  
  <!-- Solid shimmering outer boundary with fluid rippling (breathing) animation -->
  <ellipse cx="300" cy="420" rx="160" ry="220" fill="none" stroke="#FFFFFF" stroke-width="3.5" filter="url(#glow)">
    <animate attributeName="rx" values="160; 164; 157; 160" dur="4s" repeatCount="indefinite" />
    <animate attributeName="ry" values="220; 216; 224; 220" dur="4s" repeatCount="indefinite" />
  </ellipse>
  
  <!-- Shimmering particles moving along the boundary -->
  <ellipse cx="300" cy="420" rx="163" ry="223" fill="none" stroke="#FFD54F" stroke-width="2" stroke-dasharray="15 30 5 15" filter="url(#glow)">
    <animate attributeName="rx" values="163; 167; 160; 163" dur="4s" repeatCount="indefinite" />
    <animate attributeName="ry" values="223; 219; 227; 223" dur="4s" repeatCount="indefinite" />
    <animate attributeName="stroke-dashoffset" values="0; -120" dur="2s" repeatCount="indefinite" />
  </ellipse>
</g>


<!-- ================= DEFENSE MECHANISM: 6-Spark Overlapping Barrage (Phase 3: 16s - 24s) ================= -->
<!-- Spark 1 (Left, Y=310) -->
<circle cx="50" cy="270" r="5" fill="#FF1744" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.50; 0.51; 0.56; 0.61; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cx" values="50; 141; 40" keyTimes="0; 0.50; 0.56; 0.61; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cy" values="270; 310; 350" keyTimes="0; 0.50; 0.56; 0.61; 1" dur="32s" repeatCount="indefinite" />
</circle>
<!-- Burst 1 -->
<circle cx="141" cy="310" r="0" fill="none" stroke="#FFFFFF" stroke-width="2.5" filter="url(#glow)" opacity="0">
  <animate attributeName="r" values="0; 30; 0" keyTimes="0; 0.55; 0.57; 0.61; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.55; 0.57; 0.61; 1" dur="32s" repeatCount="indefinite" />
</circle>

<!-- Spark 2 (Right, Y=360) -->
<circle cx="550" cy="300" r="5" fill="#D500F9" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.53; 0.54; 0.59; 0.64; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cx" values="550; 459; 560" keyTimes="0; 0.53; 0.59; 0.64; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cy" values="300; 360; 420" keyTimes="0; 0.53; 0.59; 0.64; 1" dur="32s" repeatCount="indefinite" />
</circle>
<!-- Burst 2 -->
<circle cx="459" cy="360" r="0" fill="none" stroke="#FFFFFF" stroke-width="2.5" filter="url(#glow)" opacity="0">
  <animate attributeName="r" values="0; 30; 0" keyTimes="0; 0.58; 0.60; 0.64; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.58; 0.60; 0.64; 1" dur="32s" repeatCount="indefinite" />
</circle>

<!-- Spark 3 (Left, Y=440) -->
<circle cx="50" cy="400" r="5" fill="#FF1744" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.56; 0.57; 0.62; 0.67; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cx" values="50; 140; 30" keyTimes="0; 0.56; 0.62; 0.67; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cy" values="400; 440; 480" keyTimes="0; 0.56; 0.62; 0.67; 1" dur="32s" repeatCount="indefinite" />
</circle>
<!-- Burst 3 -->
<circle cx="140" cy="440" r="0" fill="none" stroke="#FFFFFF" stroke-width="2.5" filter="url(#glow)" opacity="0">
  <animate attributeName="r" values="0; 30; 0" keyTimes="0; 0.61; 0.63; 0.67; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.61; 0.63; 0.67; 1" dur="32s" repeatCount="indefinite" />
</circle>

<!-- Spark 4 (Right, Y=490) -->
<circle cx="550" cy="430" r="5" fill="#D500F9" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.59; 0.60; 0.65; 0.70; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cx" values="550; 459; 560" keyTimes="0; 0.59; 0.65; 0.70; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cy" values="430; 490; 550" keyTimes="0; 0.59; 0.65; 0.70; 1" dur="32s" repeatCount="indefinite" />
</circle>
<!-- Burst 4 -->
<circle cx="459" cy="490" r="0" fill="none" stroke="#FFFFFF" stroke-width="2.5" filter="url(#glow)" opacity="0">
  <animate attributeName="r" values="0; 30; 0" keyTimes="0; 0.64; 0.66; 0.70; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.64; 0.66; 0.70; 1" dur="32s" repeatCount="indefinite" />
</circle>

<!-- Spark 5 (Left, Y=560) -->
<circle cx="50" cy="520" r="5" fill="#FF1744" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.62; 0.63; 0.68; 0.73; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cx" values="50; 141; 40" keyTimes="0; 0.62; 0.68; 0.73; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cy" values="520; 560; 600" keyTimes="0; 0.62; 0.68; 0.73; 1" dur="32s" repeatCount="indefinite" />
</circle>
<!-- Burst 5 -->
<circle cx="141" cy="560" r="0" fill="none" stroke="#FFFFFF" stroke-width="2.5" filter="url(#glow)" opacity="0">
  <animate attributeName="r" values="0; 30; 0" keyTimes="0; 0.67; 0.69; 0.73; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.67; 0.69; 0.73; 1" dur="32s" repeatCount="indefinite" />
</circle>

<!-- Spark 6 (Right, Y=580) -->
<circle cx="550" cy="520" r="5" fill="#D500F9" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.65; 0.66; 0.71; 0.76; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cx" values="550; 458; 560" keyTimes="0; 0.65; 0.71; 0.76; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="cy" values="520; 580; 640" keyTimes="0; 0.65; 0.71; 0.76; 1" dur="32s" repeatCount="indefinite" />
</circle>
<!-- Burst 6 -->
<circle cx="458" cy="580" r="0" fill="none" stroke="#FFFFFF" stroke-width="2.5" filter="url(#glow)" opacity="0">
  <animate attributeName="r" values="0; 30; 0" keyTimes="0; 0.70; 0.72; 0.76; 1" dur="32s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.70; 0.72; 0.76; 1" dur="32s" repeatCount="indefinite" />

<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="750" width="620" height="150" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 8s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="32s" repeatCount="indefinite" />
    <text x="340" y="785" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFF59D" text-anchor="middle">
      PHASE 1: INHALE PROTECTIVE SUN ENERGY
    </text>
    <text x="340" y="815" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Breathe deeply and affirm 5 times:
    </text>
    <text x="340" y="840" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "I am inhaling a powerful protective energy from the Sun."
    </text>
    <text x="340" y="860" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "This energy is creating an aura of protection around me. It protects me in every way."
    </text>
    <text x="340" y="882" font-family="sans-serif" font-size="11" fill="#777" text-anchor="middle">
      (Repeat this sequence to fully program your aura)
    </text>
  </g>

  <!-- PHASE 2 TEXTS (8s - 16s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.24; 0.26; 0.48; 0.50; 1" dur="32s" repeatCount="indefinite" />
    <text x="340" y="785" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      PHASE 2: BUILD THE REFLECTIVE SHIELD
    </text>
    <text x="340" y="815" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Visualize a brilliant white-gold light enveloping your body like an egg. Affirm 3 to 9 times:
    </text>
    <text x="340" y="845" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "My aura protects me powerfully and permanently"
    </text>
    <text x="340" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "from all negative energies, entities, and influences."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (16s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.49; 0.51; 0.73; 0.75; 1" dur="32s" repeatCount="indefinite" />
    <text x="340" y="785" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FF1744" text-anchor="middle">
      PHASE 3: DEFLECTING NEGATIVE ATTACKS
    </text>
    <text x="340" y="815" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Your white-gold shield is reflective. Watch negativity hit the barrier, explode, and bounce off.
    </text>
    <text x="340" y="845" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "I am always completely safe and protected in every way."
    </text>
    <text x="340" y="870" font-family="sans-serif" font-size="11" fill="#777" text-anchor="middle">
      (Never doubt your protection. It purifies your aura and repels curses)
    </text>
  </g>

  <!-- PHASE 4 TEXTS (24s - 32s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.74; 0.76; 0.98; 1" dur="32s" repeatCount="indefinite" />
    <text x="340" y="785" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle">
      PHASE 4: STRENGTHEN &amp; LOCK DAILY
    </text>
    <text x="340" y="815" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Do this twice a day, morning and night. Before any ritual, reinforce your barrier.
    </text>
    <text x="340" y="845" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "An unprotected aura is an open door."
    </text>
    <text x="340" y="870" font-family="sans-serif" font-size="11" fill="#777" text-anchor="middle">
      (The more you practice, the more permanent and automated this shield becomes)
    </text>
  </g>
</g>

  <tspan x="40" dy="18">The energy is highly reflective,</tspan>

</text>

<text x="480" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">

  <tspan x="480" dy="18">Reinforce your shield before</tspan>
  <tspan x="480" dy="18">evocations or ritual work.</tspan>
</text>
