<meta charset="UTF-8">
<title>Aura Cleansing — Cord Cutting &amp; Solar Deflection</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Aura Cleansing — Psychic Cord Cutting &amp; Solar Deflection Shield</title>
<desc>A 24-second visual loop. Phase 1: Ultraviolet blacklight diagnostic revealing dark attachment cords. Phase 2: Astral laser slices the cords as 'TH' waves ripple out. Phase 3: Chakras sealed in gold-white light. Phase 4: Brilliant solar aura deflects incoming psychic attacks.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="6" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- 70s UV Blacklight Background Gradient -->
  <radialGradient id="uvBlacklight" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#2c144d" stop-opacity="1"/>
    <stop offset="60%" stop-color="#110524" stop-opacity="1"/>
    <stop offset="100%" stop-color="#05010a" stop-opacity="1"/>
  </radialGradient>

  <!-- Solar Shield Radial Gradient -->
  <radialGradient id="solarShieldGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    <stop offset="45%" stop-color="#FFF9C4" stop-opacity="0.4"/>
    <stop offset="85%" stop-color="#FFD54F" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32" stroke="#5F5E5A" stroke-width="1"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
    <!-- Face details -->
    <ellipse cx="286" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <path d="M292 300 Q300 305 308 300" stroke="#5F5E5A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M270 246 Q286 240 298 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M330 246 Q314 240 302 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</defs>

<!-- BACKGROUND (Ultraviolet Ether Space) -->
<rect width="720" height="940" fill="url(#uvBlacklight)"/>


<!-- ================= ASTROLOGICAL WINDOW: WANING MOON ================= -->
<g transform="translate(60, 80)" filter="url(#glow)">
  <!-- Waning Crescent Moon (Luna calante) -->
  <path d="M 0 -20 A 20 20 0 1 1 0 20 A 15 15 0 1 0 0 -20" fill="#E0E0E0" opacity="0.6"/>
  <text x="25" y="5" font-family="sans-serif" font-size="11" fill="#8c8c8c" font-weight="bold">Waning Moon Phase (Ritual Window)</text>
</g>


<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================================================================= -->
<!-- ================ SCENE 1: DETECTING UNWANTED CORDS =============== -->
<!-- ================================================================= -->
<!-- Crimson jagged cords attached to Heart (375), Solar Plexus (455) and Throat (315) -->
<g fill="none" stroke-width="3" filter="url(#glow)">
  <!-- Unbroken Cords (0s - 8s) -->
  <g stroke="#90142e" opacity="0.8">
    <animate attributeName="opacity" values="0.8; 0.8; 0; 0" keyTimes="0; 0.33; 0.35; 1" dur="24s" repeatCount="indefinite" />
    <path d="M 300 315 L 200 325 L 140 305 L 40 310" /> <!-- Throat Cord -->
    <path d="M 300 375 L 180 395 L 120 370 L 40 380" /> <!-- Heart Cord -->
    <path d="M 300 455 L 210 475 L 150 450 L 40 460" /> <!-- Solar Plexus Cord -->
  </g>

  <!-- Severed Left Cords (8s - 12s) - Fall & Fade away -->
  <g stroke="#555" opacity="0">
    <animate attributeName="opacity" values="0; 0; 0.8; 0; 0" keyTimes="0; 0.33; 0.35; 0.50; 1" dur="24s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,0; 0,10; -30,80; -30,80" keyTimes="0; 0.33; 0.35; 0.50; 1" dur="24s" repeatCount="indefinite" />
    <path d="M 180 323 L 140 305 L 40 310" /> 
    <path d="M 180 395 L 120 370 L 40 380" /> 
    <path d="M 180 471 L 150 450 L 40 460" /> 
  </g>
</g>


<!-- ================================================================= -->
<!-- ================ SCENE 2: THE ASTRAL CUTTING LASER ============= -->
<!-- ================================================================= -->
<!-- Diagonal laser blade sweeping downward to slice the cords (7s - 9.5s) -->
<g filter="url(#heavyGlow)">
  <line x1="170" y1="200" x2="230" y2="280" stroke="#FFFFFF" stroke-width="4.5" opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.28; 0.29; 0.39; 0.40; 1" dur="24s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,0; 0,280; 0,280" keyTimes="0; 0.28; 0.39; 1" dur="24s" repeatCount="indefinite" />
  </line>
</g>


<!-- ================================================================= -->
<!-- ================= PHASE 2: TH MANTRA VIBRATIONS ================= -->
<!-- ================================================================= -->
<!-- Shockwaves pulsing from severed nodes (7.5s - 12s) -->
<g stroke="#FFF59D" stroke-width="2" fill="none" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 0; 0" keyTimes="0; 0.31; 0.33; 0.50; 1" dur="24s" repeatCount="indefinite" />
  
  <!-- Throat wave -->
  <circle cx="300" cy="315" r="5"><animate attributeName="r" values="5; 75" keyTimes="0; 1" dur="24s" repeatCount="indefinite"/><animate attributeName="opacity" values="1; 0" keyTimes="0; 1" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Heart wave -->
  <circle cx="300" cy="375" r="5"><animate attributeName="r" values="5; 75" keyTimes="0; 1" dur="24s" repeatCount="indefinite"/><animate attributeName="opacity" values="1; 0" keyTimes="0; 1" dur="24s" repeatCount="indefinite"/></circle>
  <!-- Solar Plexus wave -->
  <circle cx="300" cy="455" r="5"><animate attributeName="r" values="5; 75" keyTimes="0; 1" dur="24s" repeatCount="indefinite"/><animate attributeName="opacity" values="1; 0" keyTimes="0; 1" dur="24s" repeatCount="indefinite"/></circle>
</g>


<!-- ================================================================= -->
<!-- ================ PHASE 3: CHAKRA SEALING & SHIELD =============== -->
<!-- ================================================================= -->
<!-- Brilliant white-gold solar fire flares up to seal the cut nodes (10s - 15s) -->
<g filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.40; 0.42; 0.62; 0.64; 1" dur="24s" repeatCount="indefinite" />
  <circle cx="300" cy="315" r="14" fill="#FFFFFF" />
  <circle cx="300" cy="375" r="14" fill="#FFFFFF" />
  <circle cx="300" cy="455" r="14" fill="#FFFFFF" />
</g>


<!-- ================================================================= -->
<!-- =================== THE PROTECTIVE SOLAR AURA =================== -->
<!-- ================================================================= -->
<!-- Sunlight-like sphere sweeps outward and stabilizes (13s - 23s) -->
<g filter="url(#heavyGlow)">
  <circle cx="300" cy="390" r="150" fill="url(#solarShieldGrad)" stroke="#FFFFFF" stroke-width="4.5" opacity="0">
    <animate attributeName="opacity" values="0; 0; 0.95; 0.95; 0" keyTimes="0; 0.54; 0.56; 0.95; 1" dur="24s" repeatCount="indefinite" />
    <animate attributeName="r" values="20; 165; 150; 155; 150" keyTimes="0; 0.54; 0.58; 0.70; 0.95" dur="24s" repeatCount="indefinite" />
  </circle>
</g>


<!-- ================================================================= -->
<!-- ============= PHASE 4: PSYCHIC ENERGY DEFLECTION =============== -->
<!-- ================================================================= -->
<!-- Crimson arrow/vibration arrives from offscreen left (18s), hits solar shield (19.5s) and is deflected up-left (22s) -->
<path d="M 20 300 Q 80 320 150 350" fill="none" stroke="#FF1744" stroke-width="4" stroke-dasharray="10 10" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 0; 0" keyTimes="0; 0.75; 0.76; 0.81; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="stroke-dashoffset" values="0; -80" dur="1s" repeatCount="indefinite" />
</path>

<!-- Spark at point of impact (X=150, Y=350) at 19.5s -->
<circle cx="150" cy="350" r="12" fill="#FFFFFF" filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 0; 0" keyTimes="0; 0.81; 0.82; 0.86; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="r" values="4; 30; 4" dur="1.2s" repeatCount="indefinite" />
</circle>

<!-- Deflected path bouncing off and away -->
<path d="M 150 350 Q 110 250 20 220" fill="none" stroke="#FF1744" stroke-width="4" stroke-dasharray="10 10" stroke-linecap="round" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 0" keyTimes="0; 0.81; 0.83; 0.92; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="stroke-dashoffset" values="0; 80" dur="1s" repeatCount="indefinite" />
</path>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Waning Moon Line -->
  <line x1="205" y1="80" x2="505" y2="85" />
  <!-- Severance Point Line -->
  <line x1="190" y1="365" x2="505" y2="370" />
  <!-- Solar Protection Bubble Line -->
  <line x1="450" y1="390" x2="505" y2="445" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Moon Label -->
  <text x="510" y="89" fill="#90a4ae">Waning Phase Timing</text>
  <text x="510" y="104" font-weight="normal" fill="#888">Optimal from 3 days after Full Moon to New Moon</text>

  <!-- Severance Label -->
  <text x="510" y="374" fill="#FFD54F">Severance Node (TH Vibration)</text>
  <text x="510" y="389" font-weight="normal" fill="#888">Unwanted cords cut by laser &amp; sealed in Gold</text>

  <!-- Solar Protection Label -->
  <text x="510" y="449" fill="#FFFFFF" filter="url(#glow)">Deflective Solar Shield</text>
  <text x="510" y="464" font-weight="normal" fill="#888">Repels and deflects alien attachment attempts</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 6s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#B388FF" text-anchor="middle" filter="url(#glow)">
      PHASE 1: UV BLACKLIGHT SCAN &amp; ATTACHMENT DIAGNOSTIC
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Immerse your aura in the ultraviolet ether element. Scan your chakras.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Identify cords connecting your centers to the unwanted entity or person."
    </text>
  </g>

  <!-- PHASE 2 TEXTS (6s - 13s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.23; 0.25; 0.52; 0.54; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFD54F" text-anchor="middle" filter="url(#glow)">
      PHASE 2: SEVER THE CONNECTION &amp; VIBRATE "TH"
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Command: "I now cut all ties between [Name] and my soul, totally, completely, permanently."
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Shatter the connection with your astral blade while vibrating the seed mantra TH."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (13s - 19s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.52; 0.54; 0.77; 0.79; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#glow)">
      PHASE 3: CHAKRA SEALING &amp; SOLAR ENVELOPMENT
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Seal each cut chakra point with brilliant white-gold light to prevent any re-attachment.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Expand a protective white-hot solar bubble around your entire aura."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (19s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.77; 0.79; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle" filter="url(#glow)">
      PHASE 4: DEVIOUS SHIELDING &amp; SURYA RESONANCE
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="11.5" fill="#E0E0E0" text-anchor="middle">
      Affirm: "My aura constantly and uninterruptedly deflects and repels all energies of [Name]."
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "Vibrate SURYA or RAUM to burn away attempts and reinforce your field."
    </text>
  </g>
</g>

<!-- Side notes -->
<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#B388FF" font-weight="bold">Ultraviolet Scan:</tspan>
  <tspan x="40" dy="18">The ether element is UV.</tspan>
  <tspan x="40" dy="18">Thoughts or emotions that</tspan>
  <tspan x="40" dy="18">fade in this light are not yours.</tspan>
</text>

<text x="480" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="480" dy="0" fill="#FF1744" font-weight="bold">Vampiric Parasites:</tspan>
  <tspan x="480" dy="18">Psychic vampires connect</tspan>
  <tspan x="480" dy="18">most often to the Heart,</tspan>
  <tspan x="480" dy="18">slowly depleting the host.</tspan>
</text>

</svg>
</body>
</html>
