<meta charset="UTF-8">
<title>Aura, Light Body &amp; Mental Body Alignment</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Soul Division — Modulating Focus across Aura, Light Body, and Mental Awareness</title>
<desc>A 24-second visual loop mapping three levels of attention. Phase 1: Expanding/contracting cyan outer Aura. Phase 2: Illuminating white-gold internal Body of Light. Phase 3: Radiant golden halo representing the Mental Body. Phase 4: Symmetrical integration of all three fields.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Aura Gradients -->
  <radialGradient id="mentalHaloGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="40%" stop-color="#FFF59D" stop-opacity="0.8"/>
    <stop offset="80%" stop-color="#7F77DD" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette with exact face details) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32" stroke="#5F5E5A" stroke-width="1"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
    <ellipse cx="286" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <path d="M292 300 Q300 305 308 300" stroke="#5F5E5A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M270 246 Q286 240 298 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M330 246 Q314 240 302 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================================================================= -->
<!-- =================== LAYER 2: THE ENERGETIC AURA ================= -->
<!-- ================================================================= -->
<!-- Traces the outer peripersonal space envelope, expanding/contracting during Phase 1 & 4 -->
<g filter="url(#glow)">
  <path d="M 180 710 Q 170 660 190 610 Q 210 590 230 590 Q 190 520 210 470 Q 240 400 240 330 Q 200 240 300 210 Q 400 240 360 330 Q 360 400 390 470 Q 410 520 370 590 Q 390 590 410 610 Q 430 660 420 710 Z" 
        fill="none" stroke="#00E5FF" stroke-width="3" opacity="0.1">
    <!-- Active and breathing during Phase 1 (0s-6s) and Phase 4 (18s-24s) -->
    <animate attributeName="opacity" values="0.1; 0.95; 0.1; 0.1; 0.95" keyTimes="0; 0.23; 0.25; 0.75; 1" dur="24s" repeatCount="indefinite" />
    <animate attributeName="stroke-width" values="1.5; 4.5; 1.5" dur="3s" repeatCount="indefinite" />
  </path>
</g>


<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================================================================= -->
<!-- ================= LAYER 1: THE INTERNAL BODY OF LIGHT ============ -->
<!-- ================================================================= -->
<!-- Highlights the internal somatosensory nervous network during Phase 2 & 4 -->
<g filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0.85; 0.1; 0.85" keyTimes="0; 0.23; 0.25; 0.75; 1" dur="24s" repeatCount="indefinite" />
  
  <!-- Glowing central spine line -->
  <line x1="300" y1="215" x2="300" y2="650" stroke="#FFF59D" stroke-width="4.5" stroke-linecap="round" />
  <!-- Radiant internal body contours -->
  <path d="M 230 610 L 260 480 M 370 610 L 340 480" stroke="#FFF59D" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 245 630 L 250 500 L 300 450 L 350 500 L 355 630" fill="none" stroke="#FFF59D" stroke-width="2.5" stroke-linecap="round" />
</g>


<!-- ================================================================= -->
<!-- ================ LAYER 3: THE GOLDEN MENTAL BODY ================ -->
<!-- ================================================================= -->
<!-- Glowing crown/head mandala representing raw executive awareness during Phase 3 & 4 -->
<g transform="translate(300, 255)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0; 0.85; 0.85" keyTimes="0; 0.25; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
  
  <!-- Outer mental halo expansion -->
  <circle cx="0" cy="0" r="85" fill="url(#mentalHaloGrad)" filter="url(#heavyGlow)">
    <animate attributeName="r" values="60; 95; 60" dur="3.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Dotted rays of attention shooting outward -->
  <g stroke="#FFD54F" stroke-width="1.5" stroke-dasharray="4 6" filter="url(#glow)">
    <line x1="0" y1="0" x2="-80" y2="-80" />
    <line x1="0" y1="0" x2="80" y2="-80" />
    <line x1="0" y1="0" x2="-110" y2="0" />
    <line x1="0" y1="0" x2="110" y2="0" />
    <line x1="0" y1="0" x2="0" y2="-110" />
  </g>
</g>


<!-- ================================================================= -->
<!-- ============= THE CHAKRAS (Respecting Original Design) ============= -->
<!-- ================================================================= -->
<!-- Baseline spinning chakras -->
<!-- 1st Root — Red (Y=605) -->
<g transform="translate(300,605)" opacity="0.4">
  <polygon points="0,-22 19,11 -19,11" fill="#E24B4A" stroke="#791F1F" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>

<!-- 4th Heart — Green (Y=375) -->
<g transform="translate(300,375)" opacity="0.4">
  <polygon points="0,-20 18,0 0,20 -18,0" fill="#5DCAA5" stroke="#085041" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Mental Body Line -->
  <line x1="380" y1="200" x2="505" y2="205" />
  <!-- Energetic Aura Line -->
  <line x1="390" y1="350" x2="505" y2="355" />
  <!-- Body of light Line -->
  <line x1="305" y1="500" x2="505" y2="505" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Mental Body Label -->
  <text x="510" y="209" fill="#FFD54F">Mental Body (Meta-Cognition)</text>
  <text x="510" y="224" font-weight="normal" fill="#888">Awareness monitoring; prefrontal attention control</text>

  <!-- Energetic Aura Label -->
  <text x="510" y="359" fill="#00E5FF" filter="url(#glow)">Astral Aura (Proprioception)</text>
  <text x="510" y="374" font-weight="normal" fill="#888">Peripersonal space boundary; personal buffer</text>

  <!-- Body of light Label -->
  <text x="510" y="509" fill="#FFF59D">Body of Light (Interoception)</text>
  <text x="510" y="524" font-weight="normal" fill="#888">Internal somatosensory cues and spinal currents</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 6s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00E5FF" text-anchor="middle" filter="url(#glow)">
      PHASE 1: MEDITATE AND CALIBRATE THE ASTRAL AURA
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Expand your awareness a few centimeters beyond your body. Trace the peripersonal edge.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Breathe energy into your aura. Contract and expand it smoothly in place."
    </text>
  </g>

  <!-- PHASE 2 TEXTS (6s - 12s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.23; 0.25; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFF59D" text-anchor="middle" filter="url(#glow)">
      PHASE 2: ACTIVATE AND SENSE THE BODY OF LIGHT
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Shift focus completely inward. Tune into the visceral hum and internal somatic currents.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Breathe through your spine. Feel the inner physical column glowing with warm light."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (12s - 18s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.48; 0.50; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#7F77DD" text-anchor="middle" filter="url(#glow)">
      PHASE 3: FOCUS EXCLUSIVELY ON THE MENTAL BODY
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Direct attention to awareness itself. Monitor the source and direction of your thoughts.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Wherever you place your focus, that is your mental body. Expand your observing mind."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (18s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.73; 0.75; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle" filter="url(#glow)">
      PHASE 4: INTEGRATE ALL THREE VEHICLES OF CONSCIOUSNESS
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="11.5" fill="#E0E0E0" text-anchor="middle">
      Harmonize the outer boundary (Aura), internal somatics (Light), and raw awareness (Mind).
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "Aligning these fields unifies your cognitive, perceptual, and physiological systems."
    </text>
  </g>
</g>

<!-- Side notes -->
<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#00E5FF" font-weight="bold">Outer Boundary:</tspan>
  <tspan x="40" dy="18">Meditating on the aura</tspan>
  <tspan x="40" dy="18">stabilizes the premotor</tspan>
  <tspan x="40" dy="18">parietal peripersonal maps.</tspan>
</text>

<text x="480" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="480" dy="0" fill="#FFF59D" font-weight="bold">Quiet Environment:</tspan>
  <tspan x="480" dy="18">Removing external noise</tspan>
  <tspan x="480" dy="18">prevents startle reflexes</tspan>
  <tspan x="480" dy="18">during deep somatic scans.</tspan>
</text>

</svg>
