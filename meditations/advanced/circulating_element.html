<meta charset="UTF-8">
<title>Alchemical Circulation — Hermetic Elemental Transmutation</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Hermetic Alchemical Circulation — The Eleven Steps of Elemental Transmutation</title>
<desc>A 24-second animation. Symmetrical layout cycling through the 11 alchemical phases. Features a central steam/vapor column, shifting element gradients, and glowing geometric symbols of Fire, Water, Air, and Earth.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Gradients -->
  <radialGradient id="solarExalt" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="30%" stop-color="#FFF59D" stop-opacity="0.9"/>
    <stop offset="70%" stop-color="#FFD54F" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette with exact face details) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32" stroke="#5F5E5A" stroke-width="1"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
    <ellipse cx="286" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <path d="M292 300 Q300 305 308 300" stroke="#5F5E5A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M270 246 Q286 240 298 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M330 246 Q314 240 302 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= SCENE: EXALTATION DEEP SOLAR BURST ================= -->
<!-- Blazing gold sphere expanding from the core during Phase 5 (20s - 24s) -->
<g filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0.95; 0.95; 0" keyTimes="0; 0.81; 0.83; 0.97; 1" dur="24s" repeatCount="indefinite" />
  <circle cx="300" cy="455" r="160" fill="url(#solarExalt)">
    <animate attributeName="r" values="80; 180; 160" dur="1s" repeatCount="indefinite" />
  </circle>
</g>


<!-- ================= SCENE: ALCHEMICAL VAPOR (Scalding Steam) ================= -->
<!-- Ascending warm steam circles active during Phase 1 (0s-5s) and Phase 4 (15s-20s) -->
<g stroke="#FFFFFF" stroke-width="1.5" fill="none" filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0.8; 0; 0; 0.8; 0" keyTimes="0; 0.21; 0.62; 0.64; 1" dur="24s" repeatCount="indefinite" />
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-250" dur="2s" repeatCount="indefinite" />
    <circle cx="300" cy="500" r="10"><animate attributeName="opacity" values="1; 0" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="530" r="18"><animate attributeName="opacity" values="1; 0" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="470" r="14"><animate attributeName="opacity" values="1; 0" dur="2s" repeatCount="indefinite"/></circle>
  </g>
</g>


<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================================================================= -->
<!-- ============= THE CHAKRAS (Respecting Original Design) ============= -->
<!-- ================================================================= -->
<!-- Baseline spinning chakras -->
<!-- 1st Root — Red (Y=605) -->
<g transform="translate(300,605)" opacity="0.45">
  <polygon points="0,-22 19,11 -19,11" fill="#E24B4A" stroke="#791F1F" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>

<!-- 2nd Sacral — Orange (Y=545) -->
<g transform="translate(300,545)" opacity="0.45">
  <polygon points="0,-22 19,11 -19,11" fill="#F0997B" stroke="#712B13" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>

<!-- 4th Heart — Green (Y=375) -->
<g transform="translate(300,375)" opacity="0.45">
  <polygon points="0,-20 18,0 0,20 -18,0" fill="#5DCAA5" stroke="#085041" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>


<!-- ================================================================= -->
<!-- ================ GLOWING GEOMETRIC ALCHEMY GLYPHS ================ -->
<!-- ================================================================= -->
<g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
  <!-- 1. FIRE (🜂) - Top Left. Active during Phase 1 (0s-5s) and Phase 4 (15s-20s) -->
  <g stroke="#FF1744" stroke-width="2.5" opacity="0.15">
    <animate attributeName="opacity" values="0.85; 0.85; 0.15; 0.15; 0.85; 0.15" keyTimes="0; 0.21; 0.23; 0.62; 0.83; 1" dur="24s" repeatCount="indefinite"/>
    <path d="M 110 320 L 130 280 L 150 320 Z" />
  </g>

  <!-- 2. WATER (🜄) - Bottom Left. Active during Phase 1 Distillation (0s-5s) -->
  <g stroke="#00E5FF" stroke-width="2.5" opacity="0.15">
    <animate attributeName="opacity" values="0.85; 0.85; 0.15; 0.15" keyTimes="0; 0.21; 0.23; 1" dur="24s" repeatCount="indefinite"/>
    <path d="M 110 350 L 130 390 L 150 350 Z" />
  </g>

  <!-- 3. AIR (🜁) - Top Right. Active during Phase 3 Putrefaction (10s-15s) -->
  <g stroke="#FFF59D" stroke-width="2.5" opacity="0.15">
    <animate attributeName="opacity" values="0.15; 0.15; 0.85; 0.85; 0.15; 0.15" keyTimes="0; 0.41; 0.43; 0.62; 0.64; 1" dur="24s" repeatCount="indefinite"/>
    <path d="M 450 320 L 470 280 L 490 320 Z M 453 305 L 487 305" />
  </g>

  <!-- 4. EARTH (🜃) - Bottom Right. Active during Phase 3 & 4 Sublimation (10s-20s) -->
  <g stroke="#00E676" stroke-width="2.5" opacity="0.15">
    <animate attributeName="opacity" values="0.15; 0.15; 0.85; 0.85; 0.15" keyTimes="0; 0.41; 0.43; 0.83; 1" dur="24s" repeatCount="indefinite"/>
    <path d="M 450 350 L 470 390 L 490 350 Z M 453 365 L 487 365" />
  </g>
</g>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Symmetrical Alchemy Symbol Line -->
  <line x1="440" y1="335" x2="505" y2="340" />
  <!-- Central Steam Channel Line -->
  <line x1="315" y1="410" x2="505" y2="415" />
  <!-- Solar Plexus Center Line -->
  <line x1="320" y1="455" x2="505" y2="460" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Hermetic Glyphs Label -->
  <text x="510" y="344" fill="#00E676">Hermetic Glyphs (Elements)</text>
  <text x="510" y="359" font-weight="normal" fill="#888">Symmetrical triggers for alchemical phases</text>

  <!-- Steam Channel Label -->
  <text x="510" y="419" fill="#FFFFFF" filter="url(#glow)">Cleansing Steam Channel</text>
  <text x="510" y="434" font-weight="normal" fill="#888">Ascending scalding vapor purifies seals</text>

  <!-- Exaltation Core Label -->
  <text x="510" y="464" fill="#FFD54F">Fermentation Core (3rd Plexus)</text>
  <text x="510" y="479" font-weight="normal" fill="#888">Inhales solar gold rays to multiply energy</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 5s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.20; 0.22; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FF1744" text-anchor="middle" filter="url(#glow)">
      PHASE 1: CALCINATION &amp; DISTILLATION (STEPS 1 &amp; 2)
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Circulate Fire from Root. Follow with Water in Sacral to produce scalding steam.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Feel the hot, purifying vapor rising up, thoroughly cleansing chakra seals."
    </text>
  </g>

  <!-- PHASE 2 TEXTS (5s - 10s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.20; 0.22; 0.41; 0.43; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#B388FF" text-anchor="middle" filter="url(#glow)">
      PHASE 2: SOLUTION &amp; CONJUNCTION (STEPS 3 &amp; 4)
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Circulate Ether from the Third Eye, then blend Earth with Fire at the Root.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "The elements separate and ground, restoring homeostasis across the spine."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (10s - 15s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.41; 0.43; 0.62; 0.64; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFF59D" text-anchor="middle" filter="url(#glow)">
      PHASE 3: PUTREFACTION &amp; CONGELATION (STEPS 5 &amp; 6)
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Apply moist heat via Air in the Throat. Solidify the channel by circulating cold Earth.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#00E676" font-weight="bold" text-anchor="middle">
      "Unify structural density. The channel becomes perfectly aligned and anchored."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (15s - 20s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.62; 0.64; 0.81; 0.83; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00E5FF" text-anchor="middle" filter="url(#glow)">
      PHASE 4: CIBATION &amp; SUBLIMATION (STEPS 7 &amp; 8)
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Condense fluids at the Sacral. Re-heat with Fire to vaporize, then freeze to solid.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Deeply burn remaining impurities. Re-crystallize the spiritual vessel."
    </text>
  </g>

  <!-- PHASE 5 TEXTS (20s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.81; 0.83; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle" filter="url(#glow)">
      PHASE 5: FERMENTATION, EXALTATION, MULTIPLICATION (STEPS 9-11)
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Inhale golden Solar rays into the Plexus. Exalt the core Fire to amplify the field.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "The soul's power is multiplied. The aura radiates with extreme solar brilliance."
    </text>
  </g>
</g>

<!-- Side notes -->
<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#FF1744" font-weight="bold">Hermetic Metaphor:</tspan>
  <tspan x="40" dy="18">The alchemical steps act</tspan>
  <tspan x="40" dy="18">as mental frameworks to</tspan>
  <tspan x="40" dy="18">purify internal focus.</tspan>
</text>

<text x="480" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="480" dy="0" fill="#00E676" font-weight="bold">Self-Integration:</tspan>
  <tspan x="480" dy="18">Balancing hot/cold, wet/dry</tspan>
  <tspan x="480" dy="18">forces unifies conflicting</tspan>
  <tspan x="480" dy="18">psychological energies.</tspan>
</text>

</svg>
</body>
