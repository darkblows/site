<meta charset="UTF-8">
<title>Spirit &amp; Elemental Meditation — Inner Alignment</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Spirit Meditation — Four Elements Correspondence</title>
<desc>A 24-second visualization mapping spiritual properties to elements. Fire: Will (Torso). Air: Intellect &amp; Memory (Head). Water: Feeling (Heart). Earth: Bound Consciousness (Whole Aura).</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.6"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Elemental Gradients -->
  <!-- Fire (Will) -->
  <radialGradient id="fireGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FF1744" stop-opacity="0.85"/>
    <stop offset="50%" stop-color="#FF9100" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Air (Intellect) -->
  <radialGradient id="airGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    <stop offset="45%" stop-color="#FFF59D" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Water (Feeling) -->
  <radialGradient id="waterGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.85"/>
    <stop offset="50%" stop-color="#2979FF" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Earth (Consciousness) -->
  <radialGradient id="earthGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00E676" stop-opacity="0.5"/>
    <stop offset="60%" stop-color="#FFD54F" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette with exact face details) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32" stroke="#5F5E5A" stroke-width="1"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
    <ellipse cx="286" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <path d="M292 300 Q300 305 308 300" stroke="#5F5E5A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M270 246 Q286 240 298 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M330 246 Q314 240 302 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= SCENE 1: FIRE ELEMENT (Will / Torso - 0s to 6s) ================= -->
<g opacity="0">
  <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="24s" repeatCount="indefinite"/>
  <!-- Fire Glow -->
  <circle cx="300" cy="455" r="90" fill="url(#fireGrad)" filter="url(#heavyGlow)">
    <animate attributeName="r" values="80; 105; 80" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Flame Sparks floating up -->
  <g fill="#FFD54F" filter="url(#glow)">
    <circle cx="280" cy="480" r="3"><animate attributeName="cy" values="480; 370" dur="1.5s" repeatCount="indefinite"/><animate attributeName="cx" values="280; 260; 290" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="440" r="2.5"><animate attributeName="cy" values="440; 350" dur="1.2s" repeatCount="indefinite"/><animate attributeName="cx" values="320; 340; 310" dur="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="295" cy="410" r="4"><animate attributeName="cy" values="410; 330" dur="1s" repeatCount="indefinite"/></circle>
  </g>
</g>


<!-- ================= SCENE 2: AIR ELEMENT (Intellect / Head - 6s to 12s) ================= -->
<g opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.23; 0.25; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite"/>
  <!-- Air Glow -->
  <circle cx="300" cy="260" r="75" fill="url(#airGrad)" filter="url(#heavyGlow)">
    <animate attributeName="r" values="65; 85; 65" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Swirling Wind Particles -->
  <g fill="#FFFFFF" filter="url(#glow)">
    <!-- Horizontal orbiters -->
    <circle cx="300" cy="240" r="3.5"><animate attributeName="cx" values="240; 360; 240" dur="1.5s" repeatCount="indefinite"/><animate attributeName="cy" values="240; 260; 240" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="280" r="2.5"><animate attributeName="cx" values="360; 240; 360" dur="2s" repeatCount="indefinite"/><animate attributeName="cy" values="280; 260; 280" dur="2s" repeatCount="indefinite"/></circle>
  </g>
</g>


<!-- ================= SCENE 3: WATER ELEMENT (Feeling / Chest - 12s to 18s) ================= -->
<g opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.48; 0.50; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite"/>
  <!-- Water Glow -->
  <circle cx="300" cy="410" r="100" fill="url(#waterGrad)" filter="url(#heavyGlow)">
    <animate attributeName="r" values="85; 115; 85" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Expanding concentric fluid ripples -->
  <g stroke="#00E5FF" stroke-width="2.5" fill="none" filter="url(#glow)">
    <circle cx="300" cy="410" r="20"><animate attributeName="r" values="20; 110" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="1; 0" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="410" r="50"><animate attributeName="r" values="50; 140" begin="0.5s" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="1; 0" begin="0.5s" dur="1.5s" repeatCount="indefinite"/></circle>
  </g>
</g>


<!-- ================= SCENE 4: EARTH ELEMENT (Consciousness / Aura - 18s to 24s) ================= -->
<!-- Envelops and stabilizes the entire field, linking all aspects together -->
<g opacity="0" filter="url(#heavyGlow)">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.73; 0.75; 0.98; 1" dur="24s" repeatCount="indefinite"/>
  <!-- Enclosing Golden-Green boundary -->
  <path d="M 170 430 Q 170 130 300 100 Q 430 130 430 430 Q 430 730 300 730 Q 170 730 170 430" 
        fill="url(#earthGrad)" stroke="#00E676" stroke-width="2" stroke-dasharray="8 12">
    <animate attributeName="stroke-dashoffset" values="0; -50" dur="2s" repeatCount="indefinite" />
  </path>
</g>


<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Intellect Pointer -->
  <line x1="315" y1="260" x2="505" y2="230" />
  <!-- Feeling Pointer -->
  <line x1="320" y1="375" x2="505" y2="350" />
  <!-- Will Pointer -->
  <line x1="325" y1="455" x2="505" y2="470" />
  <!-- Unified Consciousness Pointer -->
  <line x1="430" y1="430" x2="505" y2="590" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Intellect Label -->
  <text x="510" y="234" fill="#FFF59D">Intellect &amp; Memory (Air)</text>
  <text x="510" y="249" font-weight="normal" fill="#888">Mental faculties; airy currents in the mind</text>

  <!-- Feeling Label -->
  <text x="510" y="354" fill="#00E5FF">Aspects of Feeling (Water)</text>
  <text x="510" y="369" font-weight="normal" fill="#888">Emotional currents centered at the heart</text>

  <!-- Will Label -->
  <text x="510" y="474" fill="#FF1744">Force of Will (Fire)</text>
  <text x="510" y="489" font-weight="normal" fill="#888">Drive and intent located at the core</text>

  <!-- Consciousness Label -->
  <text x="510" y="594" fill="#00E676">Bound Consciousness (Earth)</text>
  <text x="510" y="609" font-weight="normal" fill="#888">Envelops and unifies all elements securely</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 6s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FF1744" text-anchor="middle" filter="url(#glow)">
      PHASE 1: CONTEMPLATE WILL &amp; THE FIRE ELEMENT
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Turn your awareness inward. Focus on your internal drive, motivation, and vital intent.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Sense the warmth of the fire element glowing at your core, anchoring your Will."
    </text>
  </g>

  <!-- PHASE 2 TEXTS (6s - 12s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.23; 0.25; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFF59D" text-anchor="middle" filter="url(#glow)">
      PHASE 2: FOCUS ON INTELLECT &amp; THE AIR ELEMENT
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Shift your attention up to the mind. Observe your cognitive flow, memory, and thoughts.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Visualize breezy, light, golden-white air currents sharpening your mental faculties."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (12s - 18s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.48; 0.50; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00E5FF" text-anchor="middle" filter="url(#glow)">
      PHASE 3: SENSE FEELINGS &amp; THE WATER ELEMENT
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Drop your awareness into the heart. Tune into emotions, feelings, and deep empathy.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Feel soothing, liquid-cyan energy flowing smoothly through your emotional body."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (18s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.73; 0.75; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00E676" text-anchor="middle" filter="url(#glow)">
      PHASE 4: BIND ASPECTS IN EARTH CONSCIOUSNESS
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Expand your focus outward to envelope the whole body. Unify Will, Intellect, and Emotion.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "Secure and ground this integrated elemental matrix within your stable consciousness."
    </text>
  </g>
</g>

<!-- Side notes -->
<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#FF1744" font-weight="bold">Elemental Refinement:</tspan>
  <tspan x="40" dy="18">Mapping elements to parts of</tspan>
  <tspan x="40" dy="18">your spirit structures the</tspan>
  <tspan x="40" dy="18">focus for internal balance.</tspan>
</text>

<text x="480" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="480" dy="0" fill="#00E676" font-weight="bold">Self-Mastery:</tspan>
  <tspan x="480" dy="18">Balancing these forces</tspan>
  <tspan x="480" dy="18">daily builds psychological</tspan>
  <tspan x="480" dy="18">resilience and focus.</tspan>
</text>

</svg>
</body>
