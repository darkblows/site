<meta charset="UTF-8">
<title>Psychic Healing — Solar Infusion Meditation</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Healing Meditation — Local Cleansing &amp; Solar Infusion</title>
<desc>A 24-second visual loop. Phase 1: Cleansing stagnant gray energy from targeted heart/stomach area. Phase 2: Raising spinal energy. Phase 3: Shoulder touch arcs projecting blazing solar white-gold light to infuse the organ. Phase 4: Grounded gold aura and present-tense affirmation.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Golden Solar Gradients -->
  <radialGradient id="solarInfusionGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="35%" stop-color="#FFF59D" stop-opacity="0.85"/>
    <stop offset="70%" stop-color="#FFD54F" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Stagnant/Sickly Cloud Gradient -->
  <radialGradient id="stagnantGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#78909C" stop-opacity="0.6"/>
    <stop offset="60%" stop-color="#37474F" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette with exact face details) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32" stroke="#5F5E5A" stroke-width="1"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
    <ellipse cx="286" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <path d="M292 300 Q300 305 308 300" stroke="#5F5E5A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M270 246 Q286 240 298 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M330 246 Q314 240 302 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= SCENE 4: INTEGRATED PROTECTIVE SOLAR AURA ================= -->
<!-- Surrounds the body after infusion to seal the field (18s - 24s) -->
<g filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 0.7; 0" keyTimes="0; 0.74; 0.76; 0.95; 1" dur="24s" repeatCount="indefinite" />
  <circle cx="300" cy="410" r="140" fill="url(#solarInfusionGrad)" />
</g>


<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================================================================= -->
<!-- ============= THE CHAKRAS (Respecting Original Design) ============= -->
<!-- ================================================================= -->
<!-- Baseline spinning chakras -->
<!-- 1st Root — Red (Y=605) -->
<g transform="translate(300,605)" opacity="0.4">
  <polygon points="0,-22 19,11 -19,11" fill="#E24B4A" stroke="#791F1F" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>

<!-- 4th Heart — Green (Y=375) -->
<g transform="translate(300,375)" opacity="0.4">
  <polygon points="0,-20 18,0 0,20 -18,0" fill="#5DCAA5" stroke="#085041" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>


<!-- ================================================================= -->
<!-- ==================== SCENE 1: AURA/ORGAN CLEANSING ================ -->
<!-- ================================================================= -->
<!-- Dark stagnant energy cloud at Heart/Solar Plexus (0s - 6s) dissolved by sweeping white bar -->
<g filter="url(#glow)">
  <circle cx="300" cy="410" r="50" fill="url(#stagnantGrad)" opacity="0.8">
    <animate attributeName="opacity" values="0.8; 0.8; 0; 0; 0" keyTimes="0; 0.20; 0.25; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <animate attributeName="r" values="50; 60; 50" dur="1.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Sweeping white purificator bar -->
  <line x1="220" y1="350" x2="380" y2="350" stroke="#FFFFFF" stroke-width="3" opacity="0">
    <animate attributeName="opacity" values="0; 1; 1; 0; 0" keyTimes="0; 0.05; 0.20; 0.25; 1" dur="24s" repeatCount="indefinite" />
    <animate attributeName="y1" values="350; 470; 350" keyTimes="0; 0.20; 1" dur="24s" repeatCount="indefinite" />
    <animate attributeName="y2" values="350; 470; 350" keyTimes="0; 0.20; 1" dur="24s" repeatCount="indefinite" />
  </line>
</g>


<!-- ================================================================= -->
<!-- =================== SCENE 2: RAISING ENERGY ===================== -->
<!-- ================================================================= -->
<!-- Gold-white core line rising up along the spine during Phase 2 (6s - 12s) -->
<line x1="300" y1="605" x2="300" y2="375" stroke="#FFFFFF" stroke-width="4.5" stroke-dasharray="230" stroke-dashoffset="230" filter="url(#glow)">
  <animate attributeName="stroke-dashoffset" values="230; 230; 0; 0; 230" keyTimes="0; 0.25; 0.48; 0.85; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="stroke" values="#FFF59D; #FFFFFF; #FFF59D; #FFFFFF; #FFF59D" dur="2s" repeatCount="indefinite" />
</line>


<!-- ================================================================= -->
<!-- ==================== SCENE 3: SOLAR INFUSION ==================== -->
<!-- ================================================================= -->
<!-- Glowing shoulder arcs and descending solar light beams to targeted center (12s - 18s) -->
<g filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.49; 0.51; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
  
  <!-- Right Shoulder Touch Arc -->
  <path d="M 370 295 Q 385 305 380 325" fill="none" stroke="#FFD54F" stroke-width="4.5" stroke-linecap="round" />
  <!-- Left Shoulder Touch Arc -->
  <path d="M 230 295 Q 215 305 220 325" fill="none" stroke="#FFD54F" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Blazing Solar Infusion Point at target Y=410 -->
  <circle cx="300" cy="410" r="10" fill="url(#solarInfusionGrad)">
    <animate attributeName="r" values="10; 80; 30; 90; 10" dur="1s" repeatCount="indefinite" />
  </circle>
</g>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Shoulder touches (Zeus Field) Line -->
  <line x1="380" y1="310" x2="505" y2="315" />
  <!-- Target Cleansed Organ Line -->
  <line x1="315" y1="410" x2="505" y2="415" />
  <!-- Rising energy spine reservoir Line -->
  <line x1="305" y1="520" x2="505" y2="525" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Shoulder touch Label -->
  <text x="510" y="319" fill="#FFD54F" filter="url(#glow)">External Touch Support</text>
  <text x="510" y="334" font-weight="normal" fill="#888">Somatic alignment triggers safe charge</text>

  <!-- Cleansed Area Label -->
  <text x="510" y="419" fill="#FFFFFF">Purified Target Area</text>
  <text x="510" y="434" font-weight="normal" fill="#888">Area cleaned of stagnant Qi; infused in gold</text>

  <!-- Spine energy Label -->
  <text x="510" y="529" fill="#00E5FF">Spinal Sushumna Current</text>
  <text x="510" y="544" font-weight="normal" fill="#888">Rises up from the Root to supply the seal</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 6s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#B0BEC5" text-anchor="middle" filter="url(#glow)">
      PHASE 1: LOCAL CLEANSE &amp; REPAIR ENERGETIC FLOW
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Identify the target organ. Visualize a sweeping white light removing any stagnant gray energy.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Clear the blocked channels first so the incoming healing charge can reach."
    </text>
  </g>

  <!-- PHASE 2 TEXTS (6s - 12s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.23; 0.25; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00E5FF" text-anchor="middle" filter="url(#glow)">
      PHASE 2: RAISE THE RESTORATIVE SPINAL FORCE
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Draw white-gold energy up from your Root and Sacral, accumulating power along the spine.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Your soul must be strong to act like the conduit, preparing to flood the cleansed organ."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (12s - 18s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.48; 0.50; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFD54F" text-anchor="middle" filter="url(#glow)">
      PHASE 3: INFUSE TARGETED AREA WITH SOLAR ENERGY
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Direct the white-gold light deep into the organ. Vibrate runic mantras to maximize charge.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="12.5" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "The illness is completely and permanently leaving. My body is healthy and strong."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (18s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.73; 0.75; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle" filter="url(#glow)">
      PHASE 4: SEAL SYSTEM &amp; DEEP SOMATIC INTEGRATION
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Stabilize the warmth. Allow the solar light to envelope your outer aura, deflecting illness.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "Rest in the knowing of natural physical homeostasis. Trust your somatic recovery."
    </text>
  </g>
</g>

<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#00E5FF" font-weight="bold">Complimentary Focus:</tspan>

  <tspan x="480" dy="18">Aligning your focus and</tspan>
