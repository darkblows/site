<meta charset="UTF-8">
<title>Past Life Regression — Subconscious Gateway</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Past Life Regression — Hypnotic Falling &amp; Mind Gateway</title>
<desc>A 24-second visualization. Phase 1: Guided 6-6-6 breathing circle. Phase 2: Concentric portals scaling outward to simulate falling. Phase 3: Glowing archway doorway opening. Phase 4: Expansion into golden stars representing subconscious memories.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Portal and Star Gradients -->
  <radialGradient id="portalGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="35%" stop-color="#00E5FF" stop-opacity="0.8"/>
    <stop offset="75%" stop-color="#7F77DD" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="goldAura" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFF59D" stop-opacity="0.8"/>
    <stop offset="60%" stop-color="#FFD54F" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette with exact face details) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32" stroke="#5F5E5A" stroke-width="1"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
    <ellipse cx="286" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <path d="M292 300 Q300 305 308 300" stroke="#5F5E5A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M270 246 Q286 240 298 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M330 246 Q314 240 302 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= SCENE 2: CONCENTRIC HYPNOTIC PORTAL RINGS ================= -->
<!-- Slowly zoom outward centered on Y=220 during Trance/Falling Phase (6s - 12s) -->
<g opacity="0">
  <animate attributeName="opacity" values="0; 0; 0.85; 0.85; 0; 0" keyTimes="0; 0.23; 0.25; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
  
  <g transform="translate(300, 220)">
    <!-- Tunnel Ring 1 -->
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.1; 4.5" dur="3s" repeatCount="indefinite"/>
      <rect x="-40" y="-40" width="80" height="80" rx="15" stroke="#00E5FF" stroke-width="1.5" stroke-dasharray="6 8" fill="none" opacity="0" filter="url(#glow)">
        <animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.15; 0.85; 1" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- Tunnel Ring 2 (Staggered) -->
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.1; 4.5" begin="1.5s" dur="3s" repeatCount="indefinite"/>
      <rect x="-40" y="-40" width="80" height="80" rx="15" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="6 8" fill="none" opacity="0" filter="url(#glow)">
        <animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.15; 0.85; 1" begin="1.5s" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</g>


<!-- ================= SCENE 4: MEMORY STARFIELD EXPANSION ================= -->
<!-- Fills the canvas with golden star particles at the deep state (18s - 24s) -->
<g opacity="0" filter="url(#glow)">
  <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.73; 0.75; 0.98; 1" dur="24s" repeatCount="indefinite" />
  <circle cx="200" cy="180" r="3"><animate attributeName="opacity" values="0.2; 1; 0.2" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="480" cy="150" r="4.5"><animate attributeName="opacity" values="1; 0.2; 1" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="150" cy="380" r="2.5" fill="#FFF59D"><animate attributeName="opacity" values="0.1; 0.9; 0.1" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="560" cy="340" r="3" fill="#FFF59D"><animate attributeName="opacity" values="0.9; 0.1; 0.9" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="100" cy="500" r="4" fill="#FFFFFF"><animate attributeName="opacity" values="0.3; 1; 0.3" dur="3s" repeatCount="indefinite"/></circle>
</g>


<!-- ================= THE MEDITATING FIGURE ================= -->
<!-- Dimmed slightly during deep falling phase for visual transition -->
<g id="figure-group">
  <animate attributeName="opacity" values="1; 1; 0.55; 0.55; 1" keyTimes="0; 0.25; 0.45; 0.85; 1" dur="24s" repeatCount="indefinite"/>
  <use href="#meditating-figure" />
</g>


<!-- ================================================================= -->
<!-- ============= THE CHAKRAS (Respecting Original Design) ============= -->
<!-- ================================================================= -->
<!-- Baseline spinning chakras -->
<!-- 1st Root — Red (Y=605) -->
<g transform="translate(300,605)" opacity="0.4">
  <polygon points="0,-22 19,11 -19,11" fill="#E24B4A" stroke="#791F1F" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>

<!-- 4th Heart — Green (Y=375) -->
<g transform="translate(300,375)" opacity="0.4">
  <polygon points="0,-20 18,0 0,20 -18,0" fill="#5DCAA5" stroke="#085041" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>


<!-- ================================================================= -->
<!-- ================= PHASE 1: GUIDED BREATHING RING ================ -->
<!-- ================================================================= -->
<!-- Centered around the solar plexus (X=300, Y=450). Fits 6-6-6-6 loop (24s total) -->
<circle cx="300" cy="450" r="10" fill="none" stroke-linecap="round" stroke-width="4.5" opacity="0" filter="url(#glow)">
  <!-- Inhale: 0s-6s (cyan expands) -> Hold: 6s-12s (gold stays) -> Exhale: 12s-18s (amber contracts) -> Off: 18s-24s -->
  <animate attributeName="opacity" values="0.85; 0.85; 0.85; 0.85; 0; 0" keyTimes="0; 0.25; 0.50; 0.75; 0.77; 1" dur="24s" repeatCount="indefinite"/>
  <animate attributeName="r" values="12; 85; 85; 85; 12; 12" keyTimes="0; 0.25; 0.50; 0.75; 0.90; 1" dur="24s" repeatCount="indefinite"/>
  <animate attributeName="stroke" values="#00E5FF; #00E5FF; #FFD54F; #FF9100; #FF1744; #00E5FF" keyTimes="0; 0.25; 0.50; 0.75; 0.90; 1" dur="24s" repeatCount="indefinite"/>
</circle>


<!-- ================================================================= -->
<!-- ================= SCENE 3: THE MIND PORTAL DOORWAY ============== -->
<!-- ================================================================= -->
<!-- Glowing arched door opening during Phase 3 (12s - 18s) -->
<g opacity="0" filter="url(#heavyGlow)">
  <animate attributeName="opacity" values="0; 0; 0.95; 0.95; 0; 0" keyTimes="0; 0.49; 0.51; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
  
  <!-- Outer Arch Glow -->
  <path d="M 260 260 L 260 170 A 40 40 0 0 1 340 170 L 340 260 Z" fill="url(#portalGrad)" />
  <!-- Arched Gate Lines -->
  <path d="M 260 260 L 260 170 A 40 40 0 0 1 340 170 L 340 260 Z" fill="none" stroke="#FFFFFF" stroke-width="3" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0 400; 400 0" keyTimes="0; 1" dur="24s" repeatCount="indefinite"/>
  </path>
  <!-- Center Divide Line representing a double door -->
  <line x1="300" y1="130" x2="300" y2="260" stroke="#00E5FF" stroke-width="1.5" />
</g>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Arch Gate Line -->
  <line x1="320" y1="160" x2="505" y2="165" />
  <!-- Falling Center Line -->
  <line x1="340" y1="260" x2="505" y2="280" />
  <!-- Rhythmic Breath Line -->
  <line x1="375" y1="450" x2="505" y2="455" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Gate Label -->
  <text x="510" y="169" fill="#00E5FF" filter="url(#glow)">Gateway of the Mind</text>
  <text x="510" y="184" font-weight="normal" fill="#888">Walk through the threshold to past lives</text>

  <!-- Tunnel Label -->
  <text x="510" y="284" fill="#7F77DD">Hypnagogic Falling Tunnel</text>
  <text x="510" y="299" font-weight="normal" fill="#888">Deepens the trance state by letting go</text>

  <!-- Breath Label -->
  <text x="510" y="459" fill="#FFF59D">6-6-6 Respiration Cycle</text>
  <text x="510" y="474" font-weight="normal" fill="#888">Stabilizes the physical anchor for safety</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 6s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00E5FF" text-anchor="middle" filter="url(#glow)">
      PHASE 1: PACING THE 6-6-6 INDUCTION BREATH
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Inhale for 6s (expand circle), hold for 6s, and exhale for 6s (contract circle).
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Settle into complete relaxation. Feel your physical coordinates dissolve."
    </text>
  </g>

  <!-- PHASE 2 TEXTS (6s - 12s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.23; 0.25; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#7F77DD" text-anchor="middle" filter="url(#glow)">
      PHASE 2: EMBARK ON THE FALLING SENSATION
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Turn attention to the back of your body. Abandon yourself and embrace the falling depth.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "If dizzy, briefly shift your focus to the front of the body to halt the drift."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (12s - 18s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.48; 0.50; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#glow)">
      PHASE 3: WALK TOWARD THE GATEWAY ARCH
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      In deep trance, visualize a door in your mind. State your year or timeline destination.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Affirm that crossing this door reveals the memories and patterns of the past."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (18s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.73; 0.75; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle" filter="url(#glow)">
      PHASE 4: ACCESS THE SUBCONSCIOUS MEMORY FIELD
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Cross the threshold. Step back, look around, and ask questions of your deep mind.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "To exit, gently step back through the same door and return to the breath."
    </text>
  </g>
</g>

<!-- Side notes -->
<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#00E5FF" font-weight="bold">Falling Depth:</tspan>
  <tspan x="40" dy="18">Focusing on the back of</tspan>
  <tspan x="40" dy="18">the body disengages active</tspan>
  <tspan x="40" dy="18">analytical sensory states.</tspan>
</text>

<text x="480" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="480" dy="0" fill="#FFF59D" font-weight="bold">Self-Safety:</tspan>
  <tspan x="480" dy="18">Never force your breath.</tspan>
  <tspan x="480" dy="18">Keep counts comfortable</tspan>
  <tspan x="480" dy="18">to ensure peaceful trance.</tspan>
</text>

</svg>
