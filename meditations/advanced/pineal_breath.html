<meta charset="UTF-8">
<title>Pineal &amp; Third Eye Breath — Somatosensory Activation</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Pineal &amp; Third Eye Breath — Spinal Inflow, Tension Hold, and Head Flood</title>
<desc>A 24-second visual loop. Phase 1: Inhaling energy from Root to Throat. Phase 2: Holding breath, creating concentrated pressure waves at the Third Eye and Pineal Gland. Phase 3: Exhaling, dispersing the pressure. Phase 4: Head filling with a golden-white flood of light.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Glowing Head Flood Gradient -->
  <radialGradient id="headFloodGrad" cx="50%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="30%" stop-color="#FFF59D" stop-opacity="0.85"/>
    <stop offset="70%" stop-color="#FFD54F" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette with exact face details) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32" stroke="#5F5E5A" stroke-width="1"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
    <ellipse cx="286" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <path d="M292 300 Q300 305 308 300" stroke="#5F5E5A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M270 246 Q286 240 298 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M330 246 Q314 240 302 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= SCENE: HEAD GLOW & LIGHT FLOOD ================= -->
<!-- Blazing gold aura that engulfs the head area during Phase 4 (18s - 24s) -->
<g filter="url(#heavyGlow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0; 1; 1; 0" keyTimes="0; 0.25; 0.74; 0.76; 0.95; 1" dur="24s" repeatCount="indefinite" />
  <circle cx="300" cy="255" r="140" fill="url(#headFloodGrad)" />
</g>


<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================================================================= -->
<!-- ======================= STATIC CHAKRAS ========================== -->
<!-- ================================================================= -->
<!-- 1st Root — Red (Y=605) -->
<g transform="translate(300,605)" opacity="0.3">
  <polygon points="0,-22 19,11 -19,11" fill="#E24B4A" stroke="#791F1F" stroke-width="1"><animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/></polygon>
</g>


<!-- ================= PHASE 1: SPINAL ENERGY INFLOW ================= -->
<!-- A stream of indigo/violet light rising from the Root to the Throat (0s - 6s) -->
<line x1="300" y1="605" x2="300" y2="315" stroke="#7F77DD" stroke-width="4" stroke-dasharray="290" stroke-dashoffset="290" stroke-linecap="round" filter="url(#glow)">
  <animate attributeName="stroke-dashoffset" values="290; 290; 0; 0" keyTimes="0; 0.05; 0.23; 1" dur="24s" repeatCount="indefinite" />
  <animate attributeName="opacity" values="0; 1; 1; 0; 0" keyTimes="0; 0.05; 0.23; 0.25; 1" dur="24s" repeatCount="indefinite" />
</line>


<!-- ================= PHASE 2: HOLD AND FOCUS PRESSURE ================= -->
<!-- Vibrating waves of purple and white at Third Eye (Y=255) and Pineal (Y=278) during Hold (6s - 12s) -->
<g filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0.95; 0.95; 0; 0" keyTimes="0; 0.23; 0.25; 0.49; 0.51; 1" dur="24s" repeatCount="indefinite" />
  
  <!-- Concentrated Pineal activation point -->
  <circle cx="300" cy="278" r="8" fill="#FFFFFF" filter="url(#heavyGlow)">
    <animate attributeName="r" values="5; 14; 8" dur="0.6s" repeatCount="indefinite" />
  </circle>

  <!-- Concentrated Third Eye activation point -->
  <circle cx="300" cy="255" r="6" fill="#7F77DD" filter="url(#heavyGlow)">
    <animate attributeName="r" values="4; 11; 6" dur="0.8s" repeatCount="indefinite" />
  </circle>

  <!-- Pressure shockwaves pulsing outward -->
  <circle cx="300" cy="265" r="10" stroke="#7F77DD" stroke-width="1.5" fill="none">
    <animate attributeName="r" values="10; 80" dur="1.2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1; 0" dur="1.2s" repeatCount="indefinite" />
  </circle>
</g>


<!-- ================= PHASE 3: EXHALE AND RELEASE ================= -->
<!-- Soft indigo waves expanding and fading from the head to simulate release (12s - 18s) -->
<g filter="url(#glow)" opacity="0">
  <animate attributeName="opacity" values="0; 0; 0.85; 0.85; 0; 0" keyTimes="0; 0.49; 0.51; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
  <circle cx="300" cy="265" r="5" stroke="#00E5FF" stroke-width="2" fill="none">
    <animate attributeName="r" values="5; 130" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1; 0" dur="2s" repeatCount="indefinite" />
  </circle>
</g>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Third Eye Target Line -->
  <line x1="312" y1="255" x2="505" y2="260" />
  <!-- Pineal Gland Center Line -->
  <line x1="315" y1="278" x2="505" y2="283" />
  <!-- Throat Chakra Hold Line -->
  <line x1="315" y1="315" x2="505" y2="320" />
  <!-- Spine base Line -->
  <line x1="310" y1="605" x2="505" y2="610" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Third Eye Label -->
  <text x="510" y="264" fill="#7F77DD">Third Eye Portal</text>
  <text x="510" y="279" font-weight="normal" fill="#888">Frontal focal point; experiences pressure</text>

  <!-- Pineal Gland Label -->
  <text x="510" y="304" fill="#FFFFFF" filter="url(#glow)">Pineal Gland Core</text>
  <text x="510" y="319" font-weight="normal" fill="#888">Deep mid-brain center; fills with gold light</text>

  <!-- Throat Chakra Label -->
  <text x="510" y="344" fill="#00E5FF">Throat Chakra (Hold Limit)</text>
  <text x="510" y="359" font-weight="normal" fill="#888">Energy is drawn up to here during inhalation</text>

  <!-- Root Spine Label -->
  <text x="510" y="614" fill="#E24B4A">Spinal Base (Inlet)</text>
  <text x="510" y="629" font-weight="normal" fill="#888">Initial source of the ascending energy thread</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 6s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#7F77DD" text-anchor="middle" filter="url(#glow)">
      PHASE 1: INHALE FROM BASE TO THROAT
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Draw energy smoothly up your spine, starting from the base up to your throat chakra.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Sustain a comfortable, steady breath inflow without straining."
    </text>
  </g>

  <!-- PHASE 2 TEXTS (6s - 12s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.23; 0.25; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#glow)">
      PHASE 2: HOLD BREATH &amp; FOCUS AT THIRD EYE / PINEAL
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Hold the breath comfortably. Focus intensely on the third eye or pineal gland.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Feel the somatic pressure or mild buzzing sensation build in your mid-head."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (12s - 18s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.48; 0.50; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00E5FF" text-anchor="middle" filter="url(#glow)">
      PHASE 3: EXHALE SMOOTHLY AND RELEASE TENSION
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Exhale gently and release the breath. Let any physical tension or pressure disperse.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Visualize the accumulated charge settling into a calm, steady state."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (18s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.73; 0.75; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle" filter="url(#glow)">
      PHASE 4: INTEGRATION &amp; DEEP BRAIN FLOOD OF LIGHT
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Settle into stillness. Feel your head fill with a warm, blissful gold-white glow.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "Bask in the lingering, highly pleasant somatic warmth inside your skull."
    </text>
  </g>
</g>

<!-- Side notes -->
<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#00E5FF" font-weight="bold">Somatic Calm:</tspan>
  <tspan x="40" dy="18">The lingering warmth</tspan>
  <tspan x="40" dy="18">and deep quiet are natural</tspan>
  <tspan x="40" dy="18">signs of vagal relaxation.</tspan>
</text>

<text x="480" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="480" dy="0" fill="#FFF59D" font-weight="bold">Breath Safety:</tspan>
  <tspan x="480" dy="18">Never force a hold.</tspan>
  <tspan x="480" dy="18">If experiencing sharp headaches,</tspan>
  <tspan x="480" dy="18">gently release and rest.</tspan>
</text>

</svg>
