<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Elemental Circulation — Microcosmic Front and Spine Fire Orbit</title>
<desc>A 24-second animation. Fire element condenses at Root, ascends front channel (skipping Heart), loops at Crown, descends spinal channel (cleansing all chakras), and grounds back at Root. Includes Sun and Moon invocation indicators.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Gradients -->
  <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="35%" stop-color="#FFD54F" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>

  <radialGradient id="moonGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="35%" stop-color="#B2EBF2" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#00ACC1" stop-opacity="0"/>

    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>

<!-- =================== THE ORBITING FIRE ELEMENT =================== -->
<!-- ================================================================= -->
<!-- Continuous loop of fire moving along the front ascent & posterior descent channels -->
<!-- Ascent: Root ➔ Sacral ➔ SolarPlex ➔ Throat ➔ ThirdEye ➔ Crown -->
<!-- Descent: Crown ➔ Post-ThirdEye ➔ Post-Throat ➔ Post-Heart ➔ Post-SolarPlex ➔ Post-Sacral ➔ Root -->
<g filter="url(#heavyGlow)">
  <!-- Symmetrical loop path -->
  <path id="orbit-path" d="M 300 605 L 300 545 L 300 455 L 300 315 L 300 255 L 300 215 C 315 215, 320 235, 315 255 L 315 315 L 315 375 L 315 455 L 315 545 L 300 605" fill="none" stroke="none" />
  
  <!-- Traveling Fire Orb -->
  <circle r="12" fill="url(#fireOrbGrad)">
    <animateMotion dur="24s" repeatCount="indefinite" calcMode="linear" rotate="auto">
      <mpath href="#orbit-path" />
    </animateMotion>
  </circle>
</g>

    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">

    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFD54F" font-weight="bold" text-anchor="middle">

    </text>
  </g>

  <!-- PHASE 3 TEXTS (12s - 20s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.49; 0.51; 0.82; 0.84; 1" dur="24s" repeatCount="indefinite" />

    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
