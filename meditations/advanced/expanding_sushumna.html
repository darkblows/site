<meta charset="UTF-8">
<title>Sushumna Expansion — Heat Generation Meditation</title>
</head>
<body style="margin:0;padding:24px;background:#0d0d0d;display:flex;justify-content:center;font-family:sans-serif;">

<svg width="720" height="940" viewBox="0 0 720 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Sushumna Expansion — Incandescent Inner Fire Meditation</title>
<desc>A 24-second visual loop. Phase 1: Focused thin sushumna line along the spine. Phase 2: Dilating to spine width. Phase 3: Expanding 5cm beyond physical boundaries. Phase 4: Radiating a massive heat field several meters beyond the body.</desc>

<defs>
  <!-- Glow Filters -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur" />
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="15" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="1.8"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Heat Gradients -->
  <!-- Sushumna Core -->
  <linearGradient id="sushumnaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FF1744" stop-opacity="0.3"/>
    <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#FF9100" stop-opacity="0.3"/>
  </linearGradient>

  <!-- Expansion Field (Thermal Wave) -->
  <radialGradient id="heatWaveGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    <stop offset="20%" stop-color="#FF9100" stop-opacity="0.6"/>
    <stop offset="60%" stop-color="#FF1744" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>

  <!-- Reusable Base Figure (Dark Silhouette with exact face details) -->
  <g id="meditating-figure">
    <ellipse cx="300" cy="720" rx="115" ry="13" fill="#888780" opacity="0.15"/>
    <path d="M215 700 Q205 660 220 630 Q235 615 260 615 L260 640 Q245 655 245 680 Q245 700 260 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M385 700 Q395 660 380 630 Q365 615 340 615 L340 640 Q355 655 355 680 Q355 700 340 705 Z" fill="#5F5E5A" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M225 615 Q210 560 225 520 Q235 495 260 480 L260 500 Q245 515 240 540 Q235 570 245 605 Q250 615 260 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M375 615 Q390 560 375 520 Q365 495 340 480 L340 500 Q355 515 360 540 Q365 570 355 605 Q350 615 340 618 Z" fill="#5F5E5A" opacity="0.38" stroke="#444441" stroke-width="1"/>
    <path d="M245 630 Q225 590 235 550 L250 500 Q235 480 238 460 Q255 452 300 450 Q345 452 362 460 Q365 480 350 500 L365 550 Q375 590 355 630 Q300 650 245 630 Z" fill="#6B6A65" opacity="0.4" stroke="#444441" stroke-width="1"/>
    <path d="M258 460 Q248 400 262 355 Q275 330 300 322 Q325 330 338 355 Q352 400 342 460 Q321 470 300 471 Q279 470 258 460 Z" fill="#888780" opacity="0.32" stroke="#5F5E5A" stroke-width="1"/>
    <circle cx="300" cy="278" r="42" fill="#B4B2A9" opacity="0.4" stroke="#5F5E5A" stroke-width="1"/>
    <path d="M262 265 Q262 224 300 218 Q338 224 338 265 Q338 238 300 232 Q262 238 262 265 Z" fill="#2C2C2A" opacity="0.55"/>
    <ellipse cx="286" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <ellipse cx="314" cy="280" rx="3" ry="4" fill="#2C2C2A" opacity="0.4"/>
    <path d="M292 300 Q300 305 308 300" stroke="#5F5E5A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M270 246 Q286 240 298 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M330 246 Q314 240 302 244" stroke="#2C2C2A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</defs>

<!-- BACKGROUND -->
<rect width="720" height="940" fill="#0d0d0d"/>


<!-- ================= SCENE: ENVIRONMENTAL CONTRAST ================= -->
<!-- Ice crystals in the corner to contrast with the core warmth generated -->
<g stroke="#00E5FF" stroke-width="1" opacity="0.25" filter="url(#glow)">
  <path d="M 40 40 L 80 80 M 80 40 L 40 80 M 60 30 L 60 90 M 30 60 L 90 60" />
  <path d="M 640 40 L 680 80 M 680 40 L 640 80 M 660 30 L 660 90 M 630 60 L 690 60" />
  <text x="100" y="65" font-family="sans-serif" font-size="11" fill="#00E5FF">Frigid Mountains Environment</text>
</g>


<!-- ================= THE MEDITATING FIGURE ================= -->
<use href="#meditating-figure" />


<!-- ================================================================= -->
<!-- ======================= THE CHAKRAS ============================= -->
<!-- ================================================================= -->
<!-- Included to match the original style sheet reference -->
<!-- 1st Root — Red (Y=605) -->
<g transform="translate(300,605)" opacity="0.4">
  <polygon points="0,-22 19,11 -19,11" fill="#E24B4A" stroke="#791F1F" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>

<!-- 4th Heart — Green (Y=375) -->
<g transform="translate(300,375)" opacity="0.4">
  <polygon points="0,-20 18,0 0,20 -18,0" fill="#5DCAA5" stroke="#085041" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>

<!-- 7th Crown — Violet (Y=215) -->
<g transform="translate(300,215)" opacity="0.4">
  <polygon points="0,15 13,-8 -13,-8" fill="#D4537E" stroke="#4B1528" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1,1;0.1,1;-1,1;0.1,1;1,1" dur="0.55s" repeatCount="indefinite"/>
  </polygon>
</g>


<!-- ================================================================= -->
<!-- =================== THE EXPANDING SUSHUMNA ====================== -->
<!-- ================================================================= -->

<!-- Phase 1: Focused thin Sushumna thread (0s - 6s) -->
<g filter="url(#glow)">
  <rect x="298" y="215" width="4" height="390" fill="url(#sushumnaGrad)" rx="2">
    <animate attributeName="opacity" values="1; 1; 0; 0; 1" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="24s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- Phase 2: Expanded to the width of the spine (6s - 12s) -->
<g filter="url(#heavyGlow)">
  <rect x="282" y="215" width="36" height="390" fill="url(#sushumnaGrad)" rx="10" opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.23; 0.25; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite"/>
    <animate attributeName="width" values="24; 44; 24" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="288; 278; 288" dur="1.5s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- Phase 3: Expanded 5cm beyond the spine (12s - 18s) -->
<g filter="url(#heavyGlow)">
  <rect x="220" y="215" width="160" height="390" fill="url(#sushumnaGrad)" rx="40" opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.48; 0.50; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- Phase 4: Enormous heat wave radiating beyond the body (18s - 24s) -->
<g filter="url(#heavyGlow)">
  <circle cx="300" cy="410" r="280" fill="url(#heatWaveGrad)" opacity="0">
    <animate attributeName="opacity" values="0; 0; 0.9; 0.9; 0" keyTimes="0; 0.73; 0.75; 0.98; 1" dur="24s" repeatCount="indefinite"/>
    <animate attributeName="r" values="100; 330; 290; 310" keyTimes="0; 0.75; 0.88; 1" dur="24s" repeatCount="indefinite"/>
  </circle>
</g>


<!-- ================================================================= -->
<!-- ================ LABELS & DOTTED POINTERS (Right) ================ -->
<!-- ================================================================= -->
<g stroke="#444" stroke-width="1" stroke-dasharray="3 3">
  <!-- Crown limit pointer -->
  <line x1="315" y1="215" x2="505" y2="220" />
  <!-- Central Sushumna pointer -->
  <line x1="304" y1="410" x2="505" y2="415" />
  <!-- Expanded thermal field pointer -->
  <line x1="420" y1="500" x2="505" y2="520" />
</g>

<!-- Labeled Texts -->
<g font-family="sans-serif" font-size="11" fill="#cccccc" font-weight="bold">
  <!-- Crown Label -->
  <text x="510" y="224" fill="#D4537E">7th Crown (Ascension Cap)</text>
  <text x="510" y="239" font-weight="normal" fill="#888">Upper exit node of the central line</text>

  <!-- Sushumna Label -->
  <text x="510" y="419" fill="#FFFFFF">Sushumna Core Channel</text>
  <text x="510" y="434" font-weight="normal" fill="#888">Baseline narrow conduit along the spine</text>

  <!-- Heat Field Label -->
  <text x="510" y="524" fill="#FF9100" filter="url(#glow)">Expanded Radiant Field</text>
  <text x="510" y="539" font-weight="normal" fill="#888">Thermal energy pushing meters beyond body</text>
</g>


<!-- ================================================================= -->
<!-- ==================== MEDITATION GUIDE PANEL ===================== -->
<!-- ================================================================= -->
<g transform="translate(0, 0)">
  <!-- Panel Glass Frame -->
  <rect x="30" y="770" width="660" height="145" rx="14" fill="#111116" stroke="#2c2c35" stroke-width="1.5" />
  
  <!-- PHASE 1 TEXTS (0s - 6s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.23; 0.25; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FF1744" text-anchor="middle" filter="url(#glow)">
      PHASE 1: STABILIZE FOCUS ON THE SUSHUMNA LINE
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Enter a deep trance. Visualize the Sushumna as a thin, highly concentrated thread of light.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFFFFF" font-weight="bold" text-anchor="middle">
      "Locate the narrow path running along your spine, glowing white-hot."
    </text>
  </g>

  <!-- PHASE 2 TEXTS (6s - 12s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.23; 0.25; 0.48; 0.50; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FF9100" text-anchor="middle" filter="url(#glow)">
      PHASE 2: DILATE TO THE LARGESS OF THE SPINE
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Command the central line to expand, filling the entire diameter of your spinal column.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFF59D" font-weight="bold" text-anchor="middle">
      "Feel the incandescent red-white energy pack tightly, building deep biological heat."
    </text>
  </g>

  <!-- PHASE 3 TEXTS (12s - 18s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.48; 0.50; 0.73; 0.75; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#glow)">
      PHASE 3: EXPAND FIVE CENTIMETERS BEYOND THE BODY
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Push the boundaries of the light cylinder. Let it flood past the bone structure.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#FFD54F" font-weight="bold" text-anchor="middle">
      "The warmth intensifies. It engulfs your entire torso, neck, and head."
    </text>
  </g>

  <!-- PHASE 4 TEXTS (18s - 24s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.73; 0.75; 0.98; 1" dur="24s" repeatCount="indefinite" />
    <text x="360" y="805" font-family="sans-serif" font-size="15" font-weight="bold" fill="#AEEA00" text-anchor="middle" filter="url(#glow)">
      PHASE 4: EXPAND THE FIELD METERS INTO THE AURA
    </text>
    <text x="360" y="835" font-family="sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">
      Extend the thermal light field meters beyond your physical shell, into the room.
    </text>
    <text x="360" y="865" font-family="sans-serif" font-size="13" font-style="italic" fill="#AEEA00" font-weight="bold" text-anchor="middle">
      "Bask in the pooling, restorative warmth. Your entire environment is flooded with fire."
    </text>
  </g>
</g>

<!-- Side notes -->
<text x="40" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="40" dy="0" fill="#FF1744" font-weight="bold">Inner Fire:</tspan>
  <tspan x="40" dy="18">Visualizing the spinal</tspan>
  <tspan x="40" dy="18">cylinder expanding builds</tspan>
  <tspan x="40" dy="18">restorative, soothing warmth.</tspan>
</text>

<text x="480" y="700" font-family="sans-serif" font-size="11" fill="#666" width="150" opacity="0.8">
  <tspan x="480" dy="0" fill="#00E5FF" font-weight="bold">Ancient Roots:</tspan>
  <tspan x="480" dy="18">Similar visualization styles</tspan>
  <tspan x="480" dy="18">are found in traditional</tspan>
  <tspan x="480" dy="18">Tibetan somatic meditations.</tspan>
</text>

</svg>
