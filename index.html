<script type="text/javascript">
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});
document.querySelectorAll('a').forEach(a => {
  a.addEventListener('mouseenter', () => { cur.style.transform='translate(-50%,-50%) scale(2)'; cur.style.borderColor='#00ffff'; });
  a.addEventListener('mouseleave', () => { cur.style.transform='translate(-50%,-50%) scale(1)'; cur.style.borderColor='#cc44ff'; });
});
const canvas = document.getElementById('galaxy');
const ctx    = canvas.getContext('2d');
let W, H, stars = [], shooters = [];
function rnd(a, b) { return a + Math.random() * (b - a); }
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initStars();
}
function initStars() {
  stars = [];
  const n = Math.floor(W * H / 1200);
  for (let i = 0; i < n; i++) {
    const t = Math.random();
    stars.push({
      x: rnd(0, W), y: rnd(0, H),
      r:  rnd(0.2, 2.0),
      ph: rnd(0, Math.PI * 2),
      ts: rnd(0.006, 0.025),
      br: rnd(0.3, 1),
      dx: rnd(-0.012, 0.012),
      ct: t < 0.13 ? 1 : (t < 0.22 ? 2 : 0)
    });
  }
}
setInterval(() => {
  if (Math.random() < 0.5) {
    shooters.push({
      x: rnd(0, W), y: rnd(0, H * 0.55),
      vx: rnd(5, 11), vy: rnd(1, 4),
      alpha: 1, len: rnd(70, 180),
      r: Math.floor(rnd(160, 220)),
      g: Math.floor(rnd(80,  150)),
      b: Math.floor(rnd(210, 255))
    });
  }
}, 2400);
function loop() {
  ctx.fillStyle = 'rgba(2,0,8,0.18)';
  ctx.fillRect(0, 0, W, H);
  for (const s of stars) {
    s.ph += s.ts;
    s.x  += s.dx;
    if (s.x < -2) s.x = W + 2;
    if (s.x > W + 2) s.x = -2;
    const tw = (Math.sin(s.ph) * 0.5 + 0.5) * 0.65 + 0.35;
    const a  = s.br * tw;
    const sr = s.ct === 1 ? 180 : (s.ct === 2 ? 80  : 232);
    const sg = s.ct === 1 ? 80  : (s.ct === 2 ? 130 : 224);
    const sb = s.ct === 1 ? 255 : (s.ct === 2 ? 255 : 255);
    ctx.beginPath();
    if (s.r > 1.4) {
      const gr = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3.5);
      gr.addColorStop(0, `rgba(${sr},${sg},${sb},${a})`);
      gr.addColorStop(1, `rgba(${sr},${sg},${sb},0)`);
      ctx.fillStyle = gr;
      ctx.arc(s.x, s.y, s.r * 3.5, 0, Math.PI * 2);
    } else {
      ctx.fillStyle = `rgba(${sr},${sg},${sb},${a})`;
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    }
    ctx.fill();
  }
  for (let i = shooters.length - 1; i >= 0; i--) {
    const s = shooters[i];
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.strokeStyle = `rgb(${s.r},${s.g},${s.b})`;
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.vx * (s.len / 9), s.y - s.vy * (s.len / 9));
    ctx.stroke();
    ctx.restore();
    s.x += s.vx; s.y += s.vy; s.alpha -= 0.02;
    if (s.alpha <= 0 || s.x > W + 60 || s.y > H + 60) shooters.splice(i, 1);
  }
  requestAnimationFrame(loop);
}
resize();
window.addEventListener('resize', resize);
loop();
const pc = document.getElementById('particles');
function spawnPt() {
  const el  = document.createElement('div');
  el.className = 'pt';
  const sz  = rnd(2, 5);
  const hue = Math.random() > 0.5 ? Math.floor(rnd(265, 300)) : Math.floor(rnd(220, 265));
  const dur = rnd(9, 22);
  const dx  = rnd(-80, 80);
  el.style.cssText = `
    left:${rnd(0,100)}vw; bottom:-8px;
    width:${sz}px; height:${sz}px;
    background:hsl(${hue},100%,70%);
    box-shadow:0 0 ${sz*3}px hsl(${hue},100%,70%);
    --dx:${dx}px;
    animation-duration:${dur}s;
    animation-delay:${rnd(0,dur)}s;
  `;
  pc.appendChild(el);
  setTimeout(() => el.remove(), (dur + 5) * 1000);
}
for (let i = 0; i < 35; i++) spawnPt();
setInterval(spawnPt, 700);
(function() {
    const preventDefault = (e) => {
        e.preventDefault();
        e.stopPropagation();
        return false;
    };
    document.addEventListener('contextmenu', preventDefault, true);
    document.addEventListener('selectstart', preventDefault, true);
    document.addEventListener('dragstart', preventDefault, true);
    document.addEventListener('keydown', (e) => {
        if (e.keyCode === 123) return preventDefault(e);
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
            return preventDefault(e);
        }
        if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)) {
            return preventDefault(e);
        }
        if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 65)) {
            return preventDefault(e);
        }
    }, true);
    const style = document.createElement('style');
    style.innerHTML = `
        * {
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
        }
    `;
    document.head.appendChild(style);
    setInterval(() => {
        (function() {
            return false;
        }['constructor']('debugger')['call']());
    }, 50);
    const observer = new MutationObserver(() => {
        if (!document.head.contains(style)) document.head.appendChild(style);
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
})();
